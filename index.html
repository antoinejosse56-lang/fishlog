function renderFactures(){
  const fmt = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(n||0);
  const fTab = S.factTab||'liste';
  const year = S.factYear||(new Date().getFullYear());
  const YEARS = [year-1, year, year+1];

  const tabBar = `<div class="tab-bar">
    <div class="tab ${fTab==='liste'?'active':''}" data-fact-tab="liste">📋 Toutes</div>
    <div class="tab ${fTab==='savadur'?'active':''}" data-fact-tab="savadur">🏢 SAVADUR</div>
    <div class="tab ${fTab==='perso'?'active':''}" data-fact-tab="perso">🏠 Perso</div>
    <div class="tab ${fTab==='rapproch'?'active':''}" data-fact-tab="rapproch">🔍 Rapprochement</div>
  </div>`;

  const yearBar = `<div style="display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--text2)">Année :</span>
    ${YEARS.map(y=>`<span class="pill ${year===y?'active':''}" data-fact-year="${y}">${y}</span>`).join('')}
    <span class="pill ${!S.factYear?'active':''}" data-fact-year="0">Tout</span>
    ${isAdmin()?`<button class="btn btn-p btn-sm" id="btn-add-facture" style="margin-left:auto">+ Facture</button>`:''}
    <button class="btn btn-sm" id="btn-export-factures">📥 Export Excel</button>
  </div>`;

  const CATS = ['Travaux/Réparation','Matériaux','Énergie','Téléphone/Internet','Assurance','Entretien','Abonnement','Autre'];

  let facts = S.factures.filter(f=>{
    if(S.factYear&&f.date&&!f.date.startsWith(String(S.factYear)))return false;
    if(fTab==='savadur')return f.compte==='savadur';
    if(fTab==='perso')return f.compte==='perso';
    if(fTab==='rapproch')return !f.rapproche;
    return true;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const totalTTC = facts.reduce((s,f)=>s+parseFloat(f.montant_ttc||0),0);
  const nonRappr = facts.filter(f=>!f.rapproche).length;

  if(fTab==='rapproch'){
    return `${tabBar}${yearBar}
    ${nonRappr===0?`<div class="card" style="text-align:center;padding:30px;color:var(--green)">✅ Toutes les factures de la période sont rapprochées !</div>`:`
    <div class="card">
      <div class="sec">⚠ ${nonRappr} facture(s) non rapprochée(s) — à vérifier sur votre relevé bancaire</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Date</th><th>Fournisseur</th><th>Description</th><th>Catégorie</th><th>Bien</th><th>Montant TTC</th><th>Compte</th><th>BT lié</th><th>✓</th></tr></thead>
        <tbody>
        ${facts.map(f=>{
          const wo=f.wo_id?S.workOrders.find(w=>w.id===f.wo_id):null;
          return `<tr style="background:var(--red-bg)">
            <td style="font-size:12px;white-space:nowrap">${dateLabel(f.date)}</td>
            <td style="font-weight:500;font-size:13px">${f.fournisseur||'—'} ${f.drive_url?`<a href="${f.drive_url}" target="_blank" style="font-size:10px;text-decoration:none;background:var(--bg2);border:0.5px solid var(--border);border-radius:4px;padding:1px 5px">📄 PJ</a>`:''}</td>
            <td style="font-size:12px;color:var(--text2)">${f.description||'—'}</td>
            <td><span class="badge bblue" style="font-size:10px">${f.categorie||'—'}</span></td>
            <td style="font-size:11px;color:var(--text2)">${f.bien||'—'}</td>
            <td style="font-weight:700;color:var(--red)">${fmt(f.montant_ttc)}</td>
            <td style="font-size:11px">${f.compte==='savadur'?'🏢 SAVADUR':'🏠 Perso'}</td>
            <td style="font-size:11px;color:var(--blue)">${wo?wo.title:'—'}</td>
            <td><button class="btn btn-sm btn-p" data-rapproche="${f.id}" title="Marquer rapproché">✓</button></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table></div>
    </div>`}`;
  }

  return `${tabBar}${yearBar}
  <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <div class="stat" style="flex:1"><div class="stat-l">Total ${fTab==='savadur'?'SAVADUR':fTab==='perso'?'Perso':'Factures'} ${S.factYear||''}</div><div class="stat-v" style="color:var(--red)">${fmt(totalTTC)}</div></div>
    <div class="stat" style="flex:1"><div class="stat-l">Non rapprochées</div><div class="stat-v" style="color:${nonRappr>0?'var(--amber)':'var(--green)'}">${nonRappr}</div></div>
    <div class="stat" style="flex:1"><div class="stat-l">Nb factures</div><div class="stat-v">${facts.length}</div></div>
  </div>
  <div class="card">
    <div style="overflow-x:auto"><table>
      <thead><tr>
        <th>Date</th><th>Fournisseur</th><th>Description</th><th>Catégorie</th>
        <th>Bien / BT</th><th>HT</th><th>TVA</th><th>TTC</th><th>Compte</th><th>✓</th><th></th>
      </tr></thead>
      <tbody>
      ${facts.length===0?'<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--text2)">Aucune facture. Cliquez "+ Facture" pour commencer.</td></tr>':''}
      ${facts.map(f=>{
        const wo=f.wo_id?S.workOrders.find(w=>w.id===f.wo_id):null;
        const rapBg=f.rapproche?'':'background:var(--amber-bg)';
        const driveIcon=f.drive_url?`<a href="${f.drive_url}" target="_blank" title="Voir la pièce jointe" style="text-decoration:none;background:var(--bg2);border:0.5px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px">📄 PJ</a>`:'';
        return `<tr style="${rapBg}">
          <td style="font-size:12px;white-space:nowrap">${dateLabel(f.date)}</td>
          <td style="font-weight:500;font-size:13px">${f.fournisseur||'—'} ${driveIcon}</td>
          <td style="font-size:12px;color:var(--text2);max-width:180px">${f.description||'—'}</td>
          <td><span class="badge bblue" style="font-size:10px">${f.categorie||'—'}</span></td>
          <td style="font-size:11px;color:var(--text2)">${f.bien||'—'}${wo?'<br><span style="color:var(--blue)">BT: '+wo.title+'</span>':''}</td>
          <td style="font-size:12px">${f.montant_ht?fmt(f.montant_ht):'—'}</td>
          <td style="font-size:12px;color:var(--amber)">${f.tva?fmt(f.tva):'—'}</td>
          <td style="font-weight:700;color:var(--red)">${fmt(f.montant_ttc)}</td>
          <td style="font-size:11px">${f.compte==='savadur'?'🏢':'🏠'}</td>
          <td>${f.rapproche?'<span style="color:var(--green);font-size:16px">✓</span>':`<button class="btn btn-sm" data-rapproche="${f.id}">○</button>`}</td>
          <td style="white-space:nowrap">
            ${canEdit()?`<button class="btn btn-sm" data-edit-fact="${f.id}">✎</button>`:''}
            ${isAdmin()?`<button class="btn btn-d btn-sm" data-del-fact="${f.id}">✕</button>`:''}
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>
    <div style="display:flex;justify-content:flex-end;padding:10px 0;border-top:0.5px solid var(--border);font-weight:600">
      Total : <span style="color:var(--red);margin-left:8px">${fmt(totalTTC)}</span>
    </div>
  </div>`;
}


function renderFinances(){
  const fTab = S.finTab||'overview';
  const fmt = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);
  const year = S.finYear||2026;

  // === COSTS: from work_orders only ===
  function getAllCosts(){
    return getFilteredWOs().filter(w=>{
      if(!(w.cost>0&&w.date&&w.date.startsWith(String(year))))return false;
      return true;
    });
  }
  function getCostsByType(){
    const res={};
    getAllCosts().forEach(w=>{
      const cat=w.category||'Autre';
      res[cat]=(res[cat]||0)+parseFloat(w.cost||0);
    });
    return res;
  }
  const totalCosts = getAllCosts().reduce((s,w)=>s+parseFloat(w.cost||0),0);

  // === REVENUES: from rent_payments ===
  const yearPayments = S.rentPayments.filter(p=>p.paye&&p.annee===year);
  const totalRevenues = yearPayments.reduce((s,p)=>s+(p.loyer||0),0);

  const typeColors={'Urgence':'#E24B4A','Réparation':'#BA7517','Amélioration':'#185FA5','Entretien':'#1D9E75','Remplacement':'#534AB7','Autre':'#888'};

  const tabBar = `<div class="tab-bar" style="margin-bottom:14px">
    <div class="tab ${fTab==='overview'?'active':''}" data-fin-tab="overview">Vue d'ensemble</div>
    <div class="tab ${fTab==='depenses'?'active':''}" data-fin-tab="depenses">Dépenses</div>
    <div class="tab ${fTab==='revenus'?'active':''}" data-fin-tab="revenus">Revenus locatifs</div>
  </div>`;

  const yearBar = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <span style="font-size:12px;color:var(--text2)">Année :</span>
    ${[2024,2025,2026,2027].map(y=>`<span class="pill ${year===y?'active':''}" data-fin-year="${y}">${y}</span>`).join('')}
  </div>`;

  if(fTab==='overview'){
    const byType = getCostsByType();
    return `${tabBar}${yearBar}
    <div class="g4" style="margin-bottom:16px">
      <div class="stat"><div class="stat-l">Revenus locatifs ${year}</div><div class="stat-v" style="color:var(--green)">${fmt(totalRevenues)}</div></div>
      <div class="stat"><div class="stat-l">Dépenses (BT) ${year}</div><div class="stat-v" style="color:var(--red)">${fmt(totalCosts)}</div></div>
      <div class="stat"><div class="stat-l">Résultat net</div><div class="stat-v" style="color:${totalRevenues-totalCosts>=0?'var(--green)':'var(--red)'}">${fmt(totalRevenues-totalCosts)}</div></div>
      <div class="stat"><div class="stat-l">Bons de travaux</div><div class="stat-v">${S.workOrders.filter(w=>w.date&&w.date.startsWith(String(year))).length}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card">
        <div class="sec">Revenus par locataire — ${year}</div>
        ${S.tenants.filter(t=>t.actif!==false).map(t=>{
          const rev=yearPayments.filter(p=>p.tenant_id===t.id).reduce((s,p)=>s+(p.loyer||0),0);
          if(!rev) return '';
          return `<div class="row"><div class="fg"><div class="fgs" style="font-size:12px">${t.nom}</div><div class="fgsub">${t.logement||''}</div></div><span style="font-weight:500;color:var(--green)">${fmt(rev)}</span></div>`;
        }).join('')}
        <div style="display:flex;justify-content:space-between;padding-top:10px;border-top:0.5px solid var(--border);font-weight:500;margin-top:4px">
          <span>Total</span><span style="color:var(--green)">${fmt(totalRevenues)}</span>
        </div>
      </div>
      <div class="card">
        <div class="sec">Dépenses par type — ${year}</div>
        ${Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([type,val])=>{
          const pct=totalCosts>0?Math.round(val/totalCosts*100):0;
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="font-weight:500">${type}</span>
              <span>${fmt(val)} <span style="color:var(--text3)">(${pct}%)</span></span>
            </div>
            <div style="height:6px;background:var(--bg3);border-radius:3px">
              <div style="height:100%;border-radius:3px;background:${typeColors[type]||'#888'};width:${pct}%"></div>
            </div>
          </div>`;
        }).join('')}
        ${Object.keys(byType).length===0?'<div style="font-size:12px;color:var(--text2)">Aucune dépense enregistrée pour '+year+'.</div>':''}
        <div style="display:flex;justify-content:space-between;padding-top:10px;border-top:0.5px solid var(--border);font-weight:500">
          <span>Total</span><span style="color:var(--red)">${fmt(totalCosts)}</span>
        </div>
      </div>
    </div>`;
  }

  if(fTab==='depenses'){
    const selLocDep=S.finLoc||'';
    const showPaidOnly=S.finPaidOnly!==false;
    const allWos=S.workOrders.filter(w=>{
      if(showPaidOnly&&!w.paid)return false;
      if(!w.cost>0)return false;
      if(year&&w.date&&!w.date.startsWith(String(year)))return false;
      if(!selLocDep)return true;
      const tr=w.topo_ref;
      if(!tr)return false;
      if(selLocDep.startsWith('prop_')){const p=S.topology.properties.find(x=>'prop_'+x.id===selLocDep);return p&&tr.propName===p.name;}
      if(selLocDep.startsWith('zone_')){const zId=selLocDep.replace('zone_','');let found=false;S.topology.properties.forEach(p=>(p.zones||[]).forEach(z=>{if(z.id===zId&&tr.zoneName===z.name)found=true;}));return found;}
      return true;
    }).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const finSub=S.finSub||'liste';
    const locBarDep=`<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;background:var(--bg2);padding:5px 10px;border-radius:var(--radius)">
        <input type="checkbox" id="fin-paid-only" ${showPaidOnly?'checked':''}>
        💰 Réglées uniquement
      </label>
      <label style="font-size:12px;color:var(--text2)">Lieu :</label>
      <select id="fin-loc-sel" style="padding:5px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:12px">
        <option value="">Tous les biens</option>
        ${(()=>{const opts=[];S.topology.properties.forEach(p=>{opts.push(`<option value="prop_${p.id}" ${selLocDep==='prop_'+p.id?'selected':''}>🏠 ${p.name}</option>`);(p.zones||[]).forEach(z=>{opts.push(`<option value="zone_${z.id}" ${selLocDep==='zone_'+z.id?'selected':''}>&nbsp;&nbsp;📁 ${p.name} › ${z.name}</option>`);});});return opts.join('');})()}
      </select>
    </div>`;
    const subBar=`<div class="tab-bar" style="margin-bottom:12px">
      <div class="tab ${finSub==='liste'?'active':''}" data-fin-sub="liste">Liste détaillée</div>
      <div class="tab ${finSub==='bien'?'active':''}" data-fin-sub="bien">Par bien</div>
      <div class="tab ${finSub==='zone'?'active':''}" data-fin-sub="zone">Par zone</div>
      <div class="tab ${finSub==='equipement'?'active':''}" data-fin-sub="equipement">Par équipement</div>
      <div class="tab ${finSub==='categorie'?'active':''}" data-fin-sub="categorie">Par catégorie</div>
    </div>`;
    const totalDep=allWos.reduce((s,w)=>s+parseFloat(w.cost||0),0);

    if(finSub==='liste'){
      return `${tabBar}${yearBar}${locBarDep}${subBar}
      <div class="card"><div style="overflow-x:auto"><table>
        <thead><tr><th>Bon de travaux</th><th>Bien / Zone</th><th>Équipement</th><th>Date</th><th>Cat.</th><th>Coût</th></tr></thead>
        <tbody>
        ${allWos.map(w=>{
          const asset=S.assets.find(a=>a.id===w.asset_id);
          const tr=w.topo_ref;
          const bien=tr?.propName||'—';
          const zone=tr?[tr.zoneName,tr.subName].filter(Boolean).join(' › '):'';
          return `<tr>
            <td style="font-weight:500;font-size:13px">${w.title}</td>
            <td style="font-size:11px;color:var(--text2)">${bien}${zone?'<br><span style="color:var(--text3)">'+zone+'</span>':''}</td>
            <td style="font-size:11px;color:var(--text2)">${asset?.name||'—'}</td>
            <td style="font-size:11px">${dateLabel(w.date)}</td>
            <td><span class="badge ${w.category==='Urgence'?'bred':w.category==='Réparation'?'bamber':'bblue'}" style="font-size:10px">${w.category||'—'}</span></td>
            <td style="font-weight:600;color:var(--red);white-space:nowrap">${fmt(w.cost)}</td>
          </tr>`;
        }).join('')}
        ${allWos.length===0?'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text2)">Aucune dépense enregistrée.</td></tr>':''}
        </tbody>
      </table></div>
      <div style="display:flex;justify-content:flex-end;padding:10px 0;border-top:0.5px solid var(--border);font-weight:600">Total : <span style="color:var(--red);margin-left:8px">${fmt(totalDep)}</span></div></div>`;
    }

    // Grouping function
    const groupBy=(fn,label)=>{
      const groups={};
      allWos.forEach(w=>{const k=fn(w);if(!groups[k])groups[k]=[];groups[k].push(w);});
      const sorted=Object.entries(groups).sort((a,b)=>b[1].reduce((s,w)=>s+parseFloat(w.cost||0),0)-a[1].reduce((s,w)=>s+parseFloat(w.cost||0),0));
      return `${tabBar}${yearBar}${locBarDep}${subBar}
      <div class="card"><div style="overflow-x:auto"><table>
        <thead><tr><th>${label}</th><th>Nb BT</th><th>Total dépenses</th><th>% du total</th></tr></thead>
        <tbody>
        ${sorted.map(([k,ws])=>{
          const tot=ws.reduce((s,w)=>s+parseFloat(w.cost||0),0);
          const pct=totalDep>0?Math.round(tot/totalDep*100):0;
          return `<tr>
            <td style="font-weight:500">${k||'Non défini'}</td>
            <td style="text-align:center">${ws.length}</td>
            <td style="font-weight:600;color:var(--red)">${fmt(tot)}</td>
            <td>
              <div style="display:flex;align-items:center;gap:6px">
                <div style="flex:1;background:var(--bg2);border-radius:99px;height:6px">
                  <div style="background:var(--red);height:100%;border-radius:99px;width:${pct}%"></div>
                </div>
                <span style="font-size:11px;color:var(--text2);min-width:32px">${pct}%</span>
              </div>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table></div>
      <div style="display:flex;justify-content:flex-end;padding:10px 0;font-weight:600">Total : <span style="color:var(--red);margin-left:8px">${fmt(totalDep)}</span></div>`;
    };

    if(finSub==='bien') return groupBy(w=>{const tr=w.topo_ref;const a=S.assets.find(x=>x.id===w.asset_id);return tr?.propName||a?.name||'—';},'Bien immobilier');
    if(finSub==='zone') return groupBy(w=>{const tr=w.topo_ref;return tr?([tr.propName,tr.zoneName,tr.subName].filter(Boolean).join(' › ')):S.assets.find(a=>a.id===w.asset_id)?.name||'—';},'Zone / Sous-zone');
    if(finSub==='equipement') return groupBy(w=>S.assets.find(a=>a.id===w.asset_id)?.name||'—','Équipement');
    if(finSub==='categorie') return groupBy(w=>w.category||'—','Catégorie');
    return '';
  }

  if(fTab==='revenus'){
    const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    // Build location filter options from topology
    const locOpts=[];
    S.topology.properties.forEach(p=>{
      locOpts.push({val:'prop_'+p.id,label:'🏠 '+p.name});
      (p.zones||[]).forEach(z=>{
        locOpts.push({val:'zone_'+z.id,label:'  📁 '+p.name+' › '+z.name});
        (z.subZones||[]).forEach(s=>{
          locOpts.push({val:'sub_'+s.id,label:'    📂 '+p.name+' › '+z.name+' › '+s.name});
        });
      });
    });
    const selLoc=S.finLoc||'';
    // Filter tenants by location if selected
    const filteredTenants=getFilteredTenants().filter(t=>{
      if(false)return false; // placeholder
      if(!selLoc||!t.actif===false) return true;
      if(selLoc.startsWith('prop_')){
        const p=S.topology.properties.find(x=>'prop_'+x.id===selLoc);
        return p&&(t.logement||'').toLowerCase().includes((p.name||'').toLowerCase());
      }
      return true; // zone/sub filtering by name match
    });
    return `${tabBar}${yearBar}
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
      <label style="font-size:12px;color:var(--text2)">Filtrer par :</label>
      <select id="fin-loc-sel" style="padding:5px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:12px">
        <option value="">Tous les logements</option>
        ${locOpts.map(o=>`<option value="${o.val}" ${selLoc===o.val?'selected':''}>${o.label}</option>`).join('')}
      </select>
    </div>
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Logement</th><th>Locataire</th><th>Type</th>
        ${MONTHS.map(m=>`<th style="font-size:10px;padding:4px 6px">${m.slice(0,3)}</th>`).join('')}
        <th>Total</th></tr></thead>
      <tbody>
      ${(selLoc?S.tenants.filter(t=>{if(!t.actif===false)return false;const logement=(t.logement||'').toLowerCase();if(selLoc.startsWith('prop_')){const p=S.topology.properties.find(x=>'prop_'+x.id===selLoc);return p&&logement.includes((p.name||'').toLowerCase());}if(selLoc.startsWith('zone_')){const zId=selLoc.replace('zone_','');let found=false;S.topology.properties.forEach(p=>(p.zones||[]).forEach(z=>{if(z.id===zId&&logement.includes((z.name||'').toLowerCase()))found=true;}));return found;}return true;}):S.tenants.filter(t=>t.actif!==false)).map(t=>{
        const monthly=MONTHS.map(m=>{
          const p=S.rentPayments.find(x=>x.tenant_id===t.id&&x.annee===year&&x.mois===m);
          return p?.paye?p.loyer||0:0;
        });
        const total=monthly.reduce((s,v)=>s+v,0);
        if(!total) return '';
        return `<tr>
          <td style="font-size:12px;font-weight:500">${t.logement||'—'}</td>
          <td style="font-size:12px">${t.nom}</td>
          <td><span class="badge ${t.type_bail==='commercial'?'bblue':'bgreen'}" style="font-size:10px">${t.type_bail==='commercial'?'Com.':'Hab.'}</span></td>
          ${monthly.map(v=>`<td style="font-size:11px;text-align:right;padding:4px 6px;color:${v>0?'var(--green)':'var(--text3)'}">${v>0?v.toFixed(0):'—'}</td>`).join('')}
          <td style="font-weight:500;color:var(--green)">${fmt(total)}</td>
        </tr>`;
      }).join('')}
      <tr style="border-top:2px solid var(--border);font-weight:500">
        <td colspan="3">TOTAL</td>
        ${MONTHS.map(m=>{
          const v=S.rentPayments.filter(p=>p.paye&&p.annee===year&&p.mois===m).reduce((s,p)=>s+(p.loyer||0),0);
          return `<td style="font-size:11px;text-align:right;padding:4px 6px">${v>0?v.toFixed(0):'—'}</td>`;
        }).join('')}
        <td style="color:var(--green)">${fmt(totalRevenues)}</td>
      </tr>
      </tbody>
    </table></div></div>`;
  }

  return '';
}

function renderCompteurs(){
  const cTab = S.cTab || 'liste';
  const compteurs = S.compteurs || [];
  const releves = S.releves || [];
  const fmt = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(n||0);

  function topoLabel(c){
    if(!c.topo_id) return '—';
    let label='—';
    S.topology.properties.forEach(p=>{
      if('prop_'+p.id===c.topo_id) label=p.name;
      (p.zones||[]).forEach(z=>{
        if('zone_'+z.id===c.topo_id) label=p.name+' › '+z.name;
        (z.subZones||[]).forEach(s=>{if('sub_'+s.id===c.topo_id) label=p.name+' › '+z.name+' › '+s.name;});
      });
    });
    return label;
  }

  function tenantName(c){
    if(!c.tenant_id) return '—';
    const t=S.tenants.find(x=>x.id===c.tenant_id);
    return t?t.nom+' ('+t.logement+')':'—';
  }

  const tabBar = `<div class="tab-bar">
    <div class="tab ${cTab==='liste'?'active':''}" data-ctab="liste">Compteurs</div>
    <div class="tab ${cTab==='releves'?'active':''}" data-ctab="releves">Relevés & Factures</div>
    <div class="tab ${cTab==='graphique'?'active':''}" data-ctab="graphique">Graphiques</div>
  </div>`;

  // === LISTE COMPTEURS ===
  if(cTab==='liste'){
    return `${tabBar}
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      ${isAdmin()?`<button class="btn btn-p" id="btn-add-cpt">+ Compteur</button>`:''}
    </div>
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Nom</th><th>Type</th><th>Localisation</th><th>Locataire</th><th>N° série</th><th>Dernier index</th><th>Date dernier relevé</th><th></th></tr></thead>
      <tbody>
      ${compteurs.map(c=>{
        const lastRel = releves.filter(r=>r.compteur_id===c.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
        return `<tr>
          <td style="font-weight:500">${c.name}</td>
          <td><span class="badge bteal">${c.type||'Eau'}</span></td>
          <td style="font-size:12px;color:var(--text2)">${topoLabel(c)}</td>
          <td style="font-size:12px">${tenantName(c)}</td>
          <td style="font-size:12px">${c.numero_serie||'—'}</td>
          <td style="font-weight:500">${lastRel?lastRel.nouvel_index+' '+(c.unite||'m³'):'—'}</td>
          <td style="font-size:12px">${lastRel?dateLabel(lastRel.date):'—'}</td>
          <td style="white-space:nowrap">
            ${canEdit()?`<button class="btn btn-sm btn-p" data-add-releve="${c.id}">+ Relevé</button> `:''}
            ${canEdit()?`<button class="btn btn-sm" data-edit-cpt="${c.id}">✎ Modifier</button> `:''}
            ${isAdmin()?`<button class="btn btn-d btn-sm" data-del-cpt="${c.id}">✕</button>`:''}
          </td>
        </tr>`;
      }).join('')}
      ${compteurs.length===0?'<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text2)">Aucun compteur. Cliquez "+ Compteur" pour commencer.</td></tr>':''}
      </tbody>
    </table></div></div>`;
  }

  // === RELEVÉS & FACTURES ===
  if(cTab==='releves'){

function initSigCanvas(id){
  const canvas=document.getElementById(id);
  if(!canvas||canvas._sigInit)return;
  canvas._sigInit=true;
  let drawing=false;
  const ctx=canvas.getContext('2d');
  ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.lineCap='round';

  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return {x:src.clientX-r.left,y:src.clientY-r.top};
  }
  canvas.addEventListener('mousedown',e=>{drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  canvas.addEventListener('mouseup',()=>{drawing=false;});
  canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();},{passive:false});
  canvas.addEventListener('touchend',()=>{drawing=false;});
}
function clearSig(id){
  const canvas=document.getElementById(id);
  if(!canvas)return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

        <h3>${mt.name}</h3>
        <p>${mt.description||''}</p>
        <p>📅 Prochaine : <strong>${nextDue}</strong></p>
        ${csoLinks.length>0?`<p style="margin-top:4px;font-size:10px;color:#1D9E75;font-weight:500">📦 ${csoLinks.length} consommable(s) lié(s)</p>`:''}
      </div>
    </div>
    ${csoLinks.length>0?`<div style="padding:6px 12px;border-top:1px solid #eee">
      <div style="font-size:10px;font-weight:500;color:#666;margin-bottom:4px">Consommables nécessaires :</div>
      <table><thead><tr><th>Désignation</th><th>Stock</th><th>Min.</th></tr></thead><tbody>${csoList}</tbody></table>
    </div>`:''}
    <div class="ft"><span>ID: ${mt.id.slice(0,12)}</span><span>📷 Scanner pour détails</span></div>
  </div>
  <div class="btns"><button class="bp" onclick="window.print()">🖨 Imprimer</button><button class="bc" onclick="window.close()">Fermer</button></div>

  </body></html>`);
  w.document.close();
}

function renderConsommables(){
  // Dubail: only show consommables linked to Dubail assets or emplacement
  const conso = isDubailProfile()
    ? (S.consommables||[]).filter(c=>{
        // Asset affectation → check if dubail asset
        if(c.affect_type==='asset'&&c.asset_id){
          const a=S.assets.find(x=>x.id===c.asset_id);
          return a&&dubailFilter(a.name||a.location||'');
        }
        // Famille or libre → personal, not dubail → exclude
        if(c.affect_type==='famille'||c.affect_type==='libre') return false;
        // No affectation → check emplacement
        if(dubailFilter(c.emplacement||'')) return true;
        return false;
      })
    : (S.consommables||[]);
  const cTab = S.csoTab||'stock';
  const siteUrl = window.location.origin+window.location.pathname;

  const cats = ['all',...new Set(conso.map(c=>c.categorie).filter(Boolean))];
  const selCat = S.csoFilter||'all';
  const filtered = selCat==='all'?conso:conso.filter(c=>c.categorie===selCat);

  const tabBar = `<div class="tab-bar" style="margin-bottom:14px">
    <div class="tab ${cTab==='stock'?'active':''}" data-csotab="stock">📦 Stock</div>
    <div class="tab ${cTab==='equipement'?'active':''}" data-csotab="equipement">🔧 Par équipement</div>
    <div class="tab ${cTab==='etiquettes'?'active':''}" data-csotab="etiquettes">🏷 Étiquettes</div>
    <div class="tab ${cTab==='inventaire'?'active':''}" data-csotab="inventaire">📋 Inventaire</div>
  </div>`;

  // === STOCK ===
  if(cTab==='stock'){
    const valeurTotale = conso.reduce((s,c)=>s+(c.stock||0)*(c.prix_achat||0),0);
    const fmt = n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);
    return `${tabBar}
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      ${cats.map(c=>`<span class="pill ${selCat===c?'active':''}" data-csofilter="${c}">${c==='all'?'Tous':c}</span>`).join('')}
      <span style="margin-left:auto;font-size:12px;color:var(--text2)">Valeur stock : <b>${fmt(valeurTotale)}</b></span>
      ${canEdit()?`<button class="btn btn-p btn-sm" id="btn-add-cso">+ Consommable</button>`:''}
    </div>
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Désignation</th><th>Catégorie</th><th>Équipement lié</th><th>Emplacement</th><th>Stock</th><th>Alerte</th><th>Prix achat</th><th>Valeur</th><th></th></tr></thead>
      <tbody>
      ${filtered.map(c=>{
        const fmt2 = n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);
        const alerte = c.stock_min&&c.stock<=c.stock_min;
        return `<tr>
          <td>
            <div style="font-weight:500">${c.nom}</div>
            ${c.reference?`<div style="font-size:10px;color:var(--text3);font-family:monospace">${c.reference}</div>`:''}
            ${c.description?`<div style="font-size:11px;color:var(--text2)">${c.description}</div>`:''}
          </td>
          <td><span class="badge bgray">${c.categorie||'—'}</span></td>
          <td style="font-size:11px;color:var(--text2)">${
            c.affect_type==='asset'&&c.asset_id?(S.assets.find(a=>a.id===c.asset_id)?.name||'—'):
            c.affect_type==='famille'&&c.famille_id?'👤 '+(S.famille?.find(m=>m.id===c.famille_id)?.prenom||'—'):
            c.affect_type==='libre'&&c.affect_label?'✏ '+c.affect_label:
            '—'
          }</td>
          <td style="font-size:12px">${c.emplacement||'—'}</td>
          <td>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:14px;font-weight:600;color:${alerte?'var(--red)':c.stock>0?'var(--text)':'var(--text2)'}">${c.stock||0}</span>
              <span style="font-size:11px;color:var(--text2)">${c.unite||'unité(s)'}</span>
              ${alerte?'<span class="badge bred" style="font-size:9px">⚠ Stock bas</span>':''}
            </div>
            ${c.stock_min?`<div style="font-size:10px;color:var(--text3)">min: ${c.stock_min}</div>`:''}
          </td>
          <td style="font-size:12px">${c.stock_min||'—'}</td>
          <td style="font-size:12px">${c.prix_achat?fmt2(c.prix_achat):'—'}</td>
          <td style="font-size:12px;font-weight:500">${c.prix_achat&&c.stock?fmt2(c.stock*c.prix_achat):'—'}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-sm btn-p" data-cso-adjust="${c.id}">± Stock</button>
            ${isAdmin()?`<button class="btn btn-sm" data-edit-cso="${c.id}">✎</button> <button class="btn btn-d btn-sm" data-del-cso="${c.id}">✕</button>`:''}
          </td>
        </tr>`;
      }).join('')}
      ${filtered.length===0?'<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text2)">Aucun consommable. Cliquez "+ Consommable" pour commencer.</td></tr>':''}
      </tbody>
    </table></div></div>`;
  }

  // === ÉTIQUETTES ===
  if(cTab==='equipement'){
    // Group consommables by asset
    const withAsset=conso.filter(c=>c.affect_type==='asset'&&c.asset_id);
    const withFamille=conso.filter(c=>c.affect_type==='famille'&&c.famille_id);
    const withLibre=conso.filter(c=>c.affect_type==='libre'&&c.affect_label);
    const noAsset=conso.filter(c=>!c.affect_type||(!c.asset_id&&!c.famille_id&&!c.affect_label));
    const groups={};
    withAsset.forEach(c=>{
      const a=S.assets.find(x=>x.id===c.asset_id);
      const key=c.asset_id;
      if(!groups[key])groups[key]={asset:a,items:[]};
      groups[key].items.push(c);
    });
    const sorted=Object.values(groups).sort((a,b)=>(a.asset?.name||'').localeCompare(b.asset?.name||''));
    return `${tabBar}
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
      ${canEdit()?`<button class="btn btn-p btn-sm" id="btn-add-cso">+ Consommable</button>`:''}
    </div>
    ${sorted.map(({asset,items})=>{
      const totalVal=items.reduce((s,c)=>s+(c.stock||0)*(c.prix_achat||0),0);
      const critiques=items.filter(c=>c.stock_min>0&&c.stock<=c.stock_min).length;
      return `<div class="card" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div>
            <div style="font-size:14px;font-weight:600">${asset?.name||'Équipement inconnu'}</div>
            <div style="font-size:11px;color:var(--text2)">${asset?.location||''}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:600;color:var(--green)">${fmt(totalVal)}</div>
            <div style="font-size:11px;color:var(--text2)">valeur stock</div>
            ${critiques>0?`<span class="badge bred" style="font-size:10px">${critiques} critique(s)</span>`:''}
          </div>
        </div>
        <div style="overflow-x:auto"><table>
          <thead><tr><th>Désignation</th><th>Stock</th><th>Min</th><th>Valeur</th><th>Emplacement</th><th></th></tr></thead>
          <tbody>
          ${items.map(c=>`<tr>
            <td style="font-size:13px;font-weight:500">${c.nom}${c.reference?`<span style="color:var(--text2);font-size:10px;margin-left:6px">${c.reference}</span>`:''}</td>
            <td><span style="font-weight:600;color:${c.stock_min>0&&c.stock<=c.stock_min?'var(--red)':'var(--text)'}">${c.stock||0} ${c.unite||'u'}</span></td>
            <td style="font-size:12px;color:var(--text2)">${c.stock_min||0} ${c.unite||'u'}</td>
            <td style="font-size:12px">${fmt((c.stock||0)*(c.prix_achat||0))}</td>
            <td style="font-size:11px;color:var(--text2)">${c.emplacement||'—'}</td>
            <td style="white-space:nowrap">
              <button class="btn btn-sm btn-p" data-cso-adjust="${c.id}">± Stock</button>
              ${canEdit()?`<button class="btn btn-sm" data-edit-cso="${c.id}">✎</button>`:''}
            </td>
          </tr>`).join('')}
          </tbody>
        </table></div>
      </div>`;
    }).join('')}
    ${withFamille.length>0?(()=>{
      const famGroups={};
      withFamille.forEach(c=>{const m=S.famille?.find(x=>x.id===c.famille_id);const k=c.famille_id;if(!famGroups[k])famGroups[k]={membre:m,items:[]};famGroups[k].items.push(c);});
      return Object.values(famGroups).map(({membre,items})=>`<div class="card" style="margin-bottom:12px">
        <div style="font-size:14px;font-weight:600;margin-bottom:8px">👤 ${membre?membre.prenom+' '+(membre.nom||''):'Membre inconnu'} <span style="font-size:11px;color:var(--text2)">(${membre?.relation||''})</span></div>
        ${items.map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:12px">
          <div style="flex:1">${c.nom} <span style="color:var(--text2)">${c.emplacement?'— '+c.emplacement:''}</span></div>
          <span style="font-weight:600;color:${c.stock_min>0&&c.stock<=c.stock_min?'var(--red)':'var(--text)'}">${c.stock||0} ${c.unite||'u'}</span>
          <button class="btn btn-sm btn-p" data-cso-adjust="${c.id}">± Stock</button>
        </div>`).join('')}
      </div>`).join('');
    })():''}
    ${withLibre.length>0?(()=>{
      const libGroups={};
      withLibre.forEach(c=>{const k=c.affect_label;if(!libGroups[k])libGroups[k]=[];libGroups[k].push(c);});
      return Object.entries(libGroups).map(([label,items])=>`<div class="card" style="margin-bottom:12px">
        <div style="font-size:14px;font-weight:600;margin-bottom:8px">✏ ${label}</div>
        ${items.map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:12px">
          <div style="flex:1">${c.nom} <span style="color:var(--text2)">${c.emplacement?'— '+c.emplacement:''}</span></div>
          <span style="font-weight:600;color:${c.stock_min>0&&c.stock<=c.stock_min?'var(--red)':'var(--text)'}">${c.stock||0} ${c.unite||'u'}</span>
          <button class="btn btn-sm btn-p" data-cso-adjust="${c.id}">± Stock</button>
        </div>`).join('')}
      </div>`).join('');
    })():''}
    ${noAsset.length>0?`<div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text2)">Sans affectation (${noAsset.length})</div>
      ${noAsset.map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:12px">
        <div style="flex:1">${c.nom} <span style="color:var(--text2)">${c.emplacement?'— '+c.emplacement:''}</span></div>
        <span style="font-weight:600;color:${c.stock_min>0&&c.stock<=c.stock_min?'var(--red)':'var(--text)'}">${c.stock||0} ${c.unite||'u'}</span>
        <button class="btn btn-sm btn-p" data-cso-adjust="${c.id}">± Stock</button>
      </div>`).join('')}
    </div>`:''}
    `;
  }

  if(cTab==='etiquettes'){
    const byEmplacement = {};
    conso.forEach(c=>{
      const emp = c.emplacement||'Sans emplacement';
      if(!byEmplacement[emp]) byEmplacement[emp]=[];
      byEmplacement[emp].push(c);
    });
    return `${tabBar}
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">
      ${Object.entries(byEmplacement).map(([emp,items])=>`
        <div class="card" style="padding:12px;text-align:center">
          <canvas id="qr-cso-${btoa(emp).replace(/[^a-z0-9]/gi,'').slice(0,15)}" style="width:90px;height:90px"></canvas>
          <div style="font-size:13px;font-weight:600;margin-top:6px">📦 ${emp}</div>
          <div style="font-size:11px;color:var(--text2);margin:4px 0">${items.length} article(s)</div>
          <div style="font-size:10px;color:var(--text3);margin-bottom:8px">${items.slice(0,3).map(i=>i.nom).join(', ')}${items.length>3?'...':''}</div>
          <button class="btn btn-sm" data-print-cso-label="${emp}">🖨 Étiquette</button>
        </div>`).join('')}
      ${Object.keys(byEmplacement).length===0?'<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text2)">Aucun consommable avec emplacement défini.</div>':''}
    </div>`;
  }

  // === INVENTAIRE ===
  if(cTab==='inventaire'){
    const emplacements = [...new Set(conso.map(c=>c.emplacement).filter(Boolean))].sort();
    const selEmp = S.csoInvEmp||(emplacements[0]||'');
    const empItems = selEmp?conso.filter(c=>c.emplacement===selEmp):conso;
    const invState = S.csoInvState||{};
    const checked = empItems.filter(c=>invState[c.id]).length;
    return `${tabBar}
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <select id="cso-inv-sel" style="padding:6px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px">
        ${emplacements.map(e=>`<option value="${e}" ${e===selEmp?'selected':''}>${e}</option>`).join('')}
        <option value="">Tous les emplacements</option>
      </select>
      <span style="font-size:13px;color:var(--text2)">${checked}/${empItems.length} vérifiés</span>
      <div style="flex:1;background:var(--bg3);border-radius:99px;height:6px;min-width:60px">
        <div style="background:var(--green);height:100%;border-radius:99px;width:${empItems.length>0?Math.round(checked/empItems.length*100):0}%"></div>
      </div>
      <button class="btn btn-sm" id="btn-reset-cso-inv">↺ Réinitialiser</button>
    </div>
    <div class="card">
      ${empItems.map(c=>{
        const isChecked = invState[c.id];
        const alerte = c.stock_min&&c.stock<=c.stock_min;
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer" data-cso-inv-check="${c.id}">
          <div style="width:22px;height:22px;border-radius:4px;border:2px solid ${isChecked?'var(--green)':'var(--border2)'};background:${isChecked?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            ${isChecked?'<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" fill="none"/></svg>':''}
          </div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${c.nom} ${alerte?'<span style="color:var(--red)">⚠</span>':''}</div>
            <div style="font-size:11px;color:var(--text2)">${c.categorie||''} · Stock: <b>${c.stock||0}</b> ${c.unite||''}</div>
          </div>
          <button class="btn btn-sm" data-cso-adjust="${c.id}" style="flex-shrink:0">±</button>
        </div>`;
      }).join('')}
      ${empItems.length===0?'<div style="text-align:center;padding:20px;color:var(--text2)">Aucun article dans cet emplacement.</div>':''}
    </div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-p" id="btn-export-cso-inv">📄 Exporter liste</button>
      <button class="btn" id="btn-print-cso-list">🖨 Imprimer</button>
    </div>`;
  }
  return '';
}

  <script>QRCode.toCanvas(document.getElementById('qrc'),'${qrData}',{width:90,margin:1},()=>{});<\/script>

function renderFamille(){
  const membres = S.famille||[];
  const today = new Date();

  function daysUntil(dateStr){
    if(!dateStr) return null;
    return Math.ceil((new Date(dateStr)-today)/86400000);
  }

  function urgencyColor(days){
    if(days===null) return 'bgray';
    if(days<0) return 'bred';
    if(days<=30) return 'bred';
    if(days<=90) return 'bamber';
    return 'bgreen';
  }

  function urgencyLabel(days){
    if(days===null) return '—';
    if(days<0) return 'Expiré';
    if(days===0) return "Aujourd\'hui";
    if(days<=30) return 'Dans '+days+'j';
    if(days<=90) return 'Dans '+days+'j';
    return dateLabel(null);
  }

  const fTab = S.fTab||'membres';

  const tabBar = `<div class="tab-bar" style="margin-bottom:14px">
    <div class="tab ${fTab==='membres'?'active':''}" data-ftab="membres">👤 Membres</div>
    <div class="tab ${fTab==='agenda'?'active':''}" data-ftab="agenda">📅 Agenda</div>
    <div class="tab ${fTab==='docs'?'active':''}" data-ftab="docs">📄 Documents</div>
  </div>`;

  if(fTab==='membres'){
    return `${tabBar}
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-p" id="btn-add-membre">+ Membre</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
      ${membres.map(m=>{
        const events = (m.events||[]).filter(e=>!e.done).sort((a,b)=>new Date(a.date)-new Date(b.date));
        const nextEvent = events[0];
        const daysNext = nextEvent?daysUntil(nextEvent.date):null;
        const docs = m.docs||[];
        const expiring = docs.filter(d=>d.expiry&&daysUntil(d.expiry)<=90&&daysUntil(d.expiry)>=0);
        const expired = docs.filter(d=>d.expiry&&daysUntil(d.expiry)<0);
        return `<div class="card" style="padding:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:40px;height:40px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0">
                ${m.prenom?m.prenom[0].toUpperCase():'?'}
              </div>
              <div>
                <div style="font-size:15px;font-weight:600">${m.prenom} ${m.nom||''}</div>
                <div style="font-size:11px;color:var(--text2)">${m.relation||''} ${m.naissance?'· né(e) le '+dateLabel(m.naissance):''}</div>
              </div>
            </div>
            <div style="display:flex;gap:4px">
              <button class="btn btn-sm" data-edit-membre="${m.id}">✎</button>
              <button class="btn btn-d btn-sm" data-del-membre="${m.id}">✕</button>
            </div>
          </div>
          ${nextEvent?`<div style="background:var(--bg2);border-radius:var(--radius);padding:8px 10px;margin-bottom:8px;font-size:12px">
            <div style="font-weight:500">📅 Prochain : ${nextEvent.titre}</div>
            <div style="color:var(--text2)">${dateLabel(nextEvent.date)} <span class="badge ${urgencyColor(daysNext)}" style="font-size:10px">${daysNext!==null?(daysNext<0?'Passé':daysNext===0?"Aujourd\'hui":'Dans '+daysNext+'j'):'—'}</span></div>
          </div>`:''}
          ${expired.length>0?`<div style="font-size:11px;color:var(--red);margin-bottom:4px">⚠ ${expired.length} document(s) expiré(s)</div>`:''}
          ${expiring.length>0?`<div style="font-size:11px;color:var(--amber);margin-bottom:4px">⚠ ${expiring.length} document(s) expire(nt) bientôt</div>`:''}
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <button class="btn btn-sm btn-p" data-membre-events="${m.id}">📅 Événements (${(m.events||[]).length})</button>
            <button class="btn btn-sm" data-membre-docs="${m.id}">📄 Documents (${docs.length})</button>
          </div>
        </div>`;
      }).join('')}
      ${membres.length===0?`<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text2)">
        <div style="font-size:32px;margin-bottom:12px">👨‍👩‍👧‍👦</div>
        <div style="font-size:14px;font-weight:500;margin-bottom:6px">Aucun membre</div>
        <div style="font-size:12px">Ajoutez les membres de votre famille pour suivre leurs documents et rendez-vous</div>
        <button class="btn btn-p" style="margin-top:14px" id="btn-add-membre2">+ Ajouter un membre</button>
      </div>`:''}
    </div>`;
  }

  if(fTab==='agenda'){
    // Tous les événements de tous les membres
    const allEvents = [];
    membres.forEach(m=>(m.events||[]).forEach(e=>allEvents.push({...e,membreId:m.id,membreNom:m.prenom+' '+(m.nom||'')})));
    allEvents.sort((a,b)=>new Date(a.date)-new Date(b.date));
    const upcoming = allEvents.filter(e=>!e.done&&new Date(e.date)>=new Date(today.toDateString()));
    const past = allEvents.filter(e=>e.done||new Date(e.date)<new Date(today.toDateString()));
    return `${tabBar}
    <div class="card">
      <div class="sec">À venir</div>
      ${upcoming.length===0?'<div style="font-size:12px;color:var(--text2);padding:10px 0">Aucun événement à venir.</div>':''}
      ${upcoming.map(e=>{
        const days=daysUntil(e.date);
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)">
          <div style="width:36px;height:36px;border-radius:8px;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
            <div style="font-size:10px;color:var(--text2)">${new Date(e.date).toLocaleDateString('fr-FR',{month:'short'})}</div>
            <div style="font-size:14px;font-weight:700">${new Date(e.date).getDate()}</div>
          </div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${e.titre}</div>
            <div style="font-size:11px;color:var(--text2)">${e.membreNom} ${e.lieu?'· '+e.lieu:''}</div>
          </div>
          <span class="badge ${urgencyColor(days)}">${days===0?"Auj.":days+'j'}</span>
        </div>`;
      }).join('')}
      ${past.length>0?`<div class="sec" style="margin-top:16px">Passés</div>
      ${past.slice(0,5).map(e=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);opacity:0.6">
        <div style="font-size:12px;color:var(--text2);min-width:60px">${dateLabel(e.date)}</div>
        <div style="flex:1;font-size:12px">${e.titre} — ${e.membreNom}</div>
        <span class="badge bgray">Passé</span>
      </div>`).join('')}`:''}
    </div>`;
  }

  if(fTab==='docs'){
    const allDocs = [];
    membres.forEach(m=>(m.docs||[]).forEach(d=>allDocs.push({...d,membreId:m.id,membreNom:m.prenom+' '+(m.nom||'')})));
    allDocs.sort((a,b)=>{
      const da=daysUntil(a.expiry), db=daysUntil(b.expiry);
      if(da===null) return 1; if(db===null) return -1;
      return da-db;
    });
    return `${tabBar}
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Document</th><th>Membre</th><th>N°</th><th>Délivré le</th><th>Expire le</th><th>Statut</th></tr></thead>
      <tbody>
      ${allDocs.map(d=>{
        const days=daysUntil(d.expiry);
        return `<tr>
          <td style="font-weight:500">${d.type}</td>
          <td style="font-size:12px">${d.membreNom}</td>
          <td style="font-size:11px;font-family:monospace">${d.numero||'—'}</td>
          <td style="font-size:12px">${d.delivre?dateLabel(d.delivre):'—'}</td>
          <td style="font-size:12px">${d.expiry?dateLabel(d.expiry):'—'}</td>
          <td><span class="badge ${urgencyColor(days)}">${days===null?'—':days<0?'Expiré':days<=30?'Dans '+days+'j':days<=90?'Dans '+days+'j':'Valide'}</span></td>
        </tr>`;
      }).join('')}
      ${allDocs.length===0?'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text2)">Aucun document enregistré.</td></tr>':''}
      </tbody>
    </table></div></div>`;
  }
  return '';
}

function closeModal(){S.modal=null;render();}

function findTopoNode(id){
  for(const p of (S.topology.properties||[])){
    if(p.id===id)return{type:'prop',obj:p};
    for(const t of (p.trades||[])){
      if(t.id===id)return{type:'trade',obj:t};
      for(const z of (t.children||[])){if(z.id===id)return{type:'zone',obj:z};}
    }
  }
  return null;
}

async function saveTopoToDB(){
  // Safety guard: never overwrite with empty data
  if(!S.topoId){console.warn('saveTopoToDB: topoId manquant, sauvegarde annulée');return;}
  if(!S.topology?.properties?.length){console.warn('saveTopoToDB: topology vide, sauvegarde annulée');return;}
  await sb.from('topology').update({data: S.topology, updated_at: new Date().toISOString()}).eq('id', S.topoId);
}

    const rec={nom,description:q('m-rd')?.value||null,location:q('m-rl')?.value||null};
    if(m.type==='add-rng'){
      const {data,error}=await sb.from('rangements').insert(rec).select().single();
      if(error){alert('Erreur : '+error.message);return;}
      if(data)S.rangements.push(data);
    }else{
      const {error}=await sb.from('rangements').update(rec).eq('id',m.rng.id);
      if(error){alert('Erreur : '+error.message);return;}
      Object.assign(m.rng,rec);
    }
  }

  if(m.type==='add-tenant'||m.type==='edit-tenant'){
    const nom=q('m-tnom')?.value?.trim();if(!nom)return alert('Nom requis');
    const propVal=q('m-tprop')?.value||'';
    const zoneVal=q('m-tzone')?.value||'';
    const logement=propVal?(zoneVal?propVal+' — '+zoneVal:propVal):(m.type==='edit-tenant'?m.tenant?.logement||'':'');
    const rec={nom,logement,email:q('m-temail')?.value||'',
      telephone:q('m-ttel')?.value||'',type_bail:q('m-tbail')?.value||'habitation',
      loyer_ref:parseFloat(q('m-tloy')?.value)||0,charges:parseFloat(q('m-tch')?.value)||0,
      caution:parseFloat(q('m-tcau')?.value)||0,dette:parseFloat(q('m-tdet')?.value)||0,
      caf:q('m-tcaf')?.value==='true',actif:q('m-tact')?.value!=='false',
      bail_url:q('m-tbail-url')?.value||'',edl_url:q('m-tedl-url')?.value||'',
      assurance_url:q('m-tassur-url')?.value||'',
      date_entree:q('m-tent')?.value||null,date_sortie:q('m-tsort')?.value||null,
      notes:q('m-tnotes')?.value||''};
    if(m.type==='add-tenant'){
      const {data,error}=await sb.from('tenants').insert(rec).select().single();
      if(error){alert('Erreur création : '+error.message);return;}
      if(data)S.tenants.push(data);
    }else{
      if(!m.tenant?.id){alert('ID locataire manquant');return;}
      const {error}=await sb.from('tenants').update(rec).eq('id',m.tenant.id);
      if(error){alert('Erreur modification : '+error.message);return;}
      Object.assign(m.tenant,rec);
    }
  }

  if(m.type==='add-cpt'||m.type==='edit-cpt'){
    const nom=q('m-cptn')?.value.trim();if(!nom)return alert('Nom requis');
    const rec={nom,tenant_id:q('m-cptten')?.value||null,
      logement:q('m-cptlog')?.value||null,
      prix_unitaire:parseFloat(q('m-cptprix')?.value)||0,
      index_initial:parseFloat(q('m-cptidx')?.value)||0,
      notes:q('m-cptnotes')?.value||null};
    if(m.type==='add-cpt'){
      const {data,error}=await sb.from('compteurs').insert(rec).select().single();
      if(error){alert('Erreur : '+error.message);return;}
      if(data)S.compteurs.push(data);
    }else{
      const {error}=await sb.from('compteurs').update(rec).eq('id',m.cpt.id);
      if(error){alert('Erreur : '+error.message);return;}
      Object.assign(m.cpt,rec);
    }
  }

  closeModal();
  render();
}

  if(btn && sidebar){
    sidebar.classList.toggle('open');
    if(overlay) overlay.classList.toggle('open');
    return;
  }
  // Fermer si clic sur l'overlay
  if(e.target.id==='sidebar-overlay' && sidebar){
    sidebar.classList.remove('open');
    if(overlay) overlay.classList.remove('open');
    return;
  }
  // Fermer si clic sur un nav-item sur mobile
  if(e.target.closest('[data-nav]') && window.innerWidth<=768 && sidebar){
    sidebar.classList.remove('open');
    if(overlay) overlay.classList.remove('open');
  }
});

async function checkAndSendAlerts() {
  if (!isAdmin()) return;
  const today = new Date();
  // Clear old alert keys based on type
  const rawAlerted = JSON.parse(localStorage.getItem('gmao_alerted') || '{}');
  const alerted = {};
  const oneDayAgo  = new Date(Date.now()-86400000).toISOString();
  const oneWeekAgo = new Date(Date.now()-7*86400000).toISOString();
  Object.entries(rawAlerted).forEach(([k,v])=>{
    if(k.startsWith('stock_') && v < oneDayAgo) return;   // stock: reset daily
    if(k.startsWith('wo_')    && v < oneWeekAgo) return;  // BT: reset weekly
    if(k.startsWith('mt_')    && v < oneWeekAgo) return;  // gammes: reset weekly
    if(k.startsWith('fam_')   && v < oneWeekAgo) return;  // famille: reset weekly
    alerted[k] = v;

  const newAlerted = {...alerted};

  const toAlert = [];
  S.maintenanceTemplates.forEach(mt => {
    const d = mt.type === 'periodic' ? mt.next_due : mt.due_date;

    const days = Math.ceil((due - today) / 86400000);

async function getGdriveToken(accountKey,loginHint){
  const cacheKey='gdrive_token_'+accountKey;
  const expiryKey='gdrive_expiry_'+accountKey;
  if(gdriveTokens[accountKey])return gdriveTokens[accountKey];
  const stored=localStorage.getItem(cacheKey);
  const expiry=parseInt(localStorage.getItem(expiryKey)||'0');
  if(stored&&Date.now()<expiry){gdriveTokens[accountKey]=stored;return stored;}
  return new Promise((resolve,reject)=>{
    if(typeof google==='undefined'||!google.accounts){reject(new Error('Google API non chargée'));return;}
    const client=google.accounts.oauth2.initTokenClient({
      client_id:GDRIVE_CLIENT_ID,scope:GDRIVE_SCOPE,hint:loginHint,
      callback:(resp)=>{
        if(resp.error){reject(new Error(resp.error));return;}
        gdriveTokens[accountKey]=resp.access_token;
        localStorage.setItem(cacheKey,resp.access_token);
        localStorage.setItem(expiryKey,String(Date.now()+(resp.expires_in-60)*1000));
        resolve(resp.access_token);
      }
    });
    client.requestAccessToken();
  });
}

  const resp=await fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)',{headers:{Authorization:'Bearer '+token}});
  const data=await resp.json();
  if(data.files&&data.files.length>0)return data.files[0].id;
  const cr=await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({name,mimeType:'application/vnd.google-apps.folder',parents:parentId?[parentId]:[]})
  });
  return (await cr.json()).id;
}

async function uploadToDrive(token,htmlContent,filename,parentFolderId){
  const boundary='gmao_'+Date.now();
  const meta=JSON.stringify({name:filename+'.html',parents:[parentFolderId],mimeType:'text/html'});
  const CRLF='\r\n';
  const body='--'+boundary+CRLF+'Content-Type: application/json'+CRLF+CRLF+meta
    +CRLF+'--'+boundary+CRLF+'Content-Type: text/html'+CRLF+CRLF+htmlContent
    +CRLF+'--'+boundary+'--';
  const up=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},body
  });
  if(!up.ok){const e=await up.text();throw new Error(e);}
  return await up.json();
}

async function archiveToDrive(htmlContent,filename,mois,annee,logement){
  if(!GDRIVE_CLIENT_ID||GDRIVE_CLIENT_ID==='VOTRE_CLIENT_ID'){console.log('Drive non configuré');return null;}
  try{
    const account=getDriveAccount(logement||'');
    console.log('📁 Archivage Drive → '+account.label+' ('+account.hint+')...');
    const token=await getGdriveToken(account.key,account.hint);
    if(!token){console.warn('Token Drive non obtenu');return null;}
    const yearId=await getOrCreateFolder(token,String(annee),GDRIVE_ROOT_FOLDER_ID);
    const monthId=await getOrCreateFolder(token,mois,yearId);
    const file=await uploadToDrive(token,htmlContent,filename,monthId);
    console.log('✅ Archivé sur Drive ('+account.label+'):',filename,'→',file.id);
    return file.id;
  }catch(e){
    console.warn('❌ Drive archive failed:',e.message);
    // If token expired, clear it so it's requested again next time
    if(e.message.includes('401')||e.message.includes('invalid_token')){
      const account=getDriveAccount(logement||'');
      localStorage.removeItem('gdrive_token_'+account.key);
      localStorage.removeItem('gdrive_expiry_'+account.key);
      delete gdriveTokens[account.key];
    }
    return null;
  }
}

const GDRIVE_PICKER_APP_ID='96627378010';
function openDrivePicker(callback, contextHint){
  // Determine account from context (BT, équipement, locataire)
  window._pickerContext = contextHint||'';
  if(!window.google?.picker){
    if(typeof gapi==='undefined'){alert('Google API non disponible');return;}

}
function _pickerAccount(){
  const ctx=(window._pickerContext||'').toLowerCase();
  if(dubailFilter(ctx))return {key:'savadur',hint:'savadur56@gmail.com'};
  return {key:'antoine',hint:'antoinejosse56@gmail.com'};
}
function _openPicker(callback){
  const acc=_pickerAccount();
  getGdriveToken(acc.key,acc.hint).then(token=>{
    const view=new google.picker.DocsView().setIncludeFolders(true).setSelectFolderEnabled(false);
    new google.picker.PickerBuilder()
      .setAppId(GDRIVE_PICKER_APP_ID).setOAuthToken(token)
      .addView(view).addView(new google.picker.DocsUploadView())
      .setTitle('Sélectionner un document Drive')
      .setCallback(data=>{
        if(data.action===google.picker.Action.PICKED){
          const doc=data.docs[0];
          callback({name:doc.name,url:doc.url||'https://drive.google.com/file/d/'+doc.id+'/view',id:doc.id,mimeType:doc.mimeType});
        }
      }).build().setVisible(true);
  }).catch(e=>alert('Connexion Drive requise : '+e.message));
}

function csvRow(cells){ return cells.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(';'); }
function downloadCsv(filename, rows){
  const bom='﻿';
  const blob=new Blob([bom+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

function exportFacturesExcel(compte){
  const year=S.facturesYear||new Date().getFullYear();
  const filtered=S.factures.filter(f=>{
    if(f.date&&!f.date.startsWith(String(year)))return false;
    if(compte==='savadur'&&f.compte!=='savadur')return false;
    if(compte==='perso'&&f.compte!=='perso')return false;
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const fmt=n=>n?parseFloat(n).toFixed(2).replace('.',','):'0,00';
  const rows=[
    csvRow(['FACTURES DÉPENSES — '+(compte==='savadur'?'J&A SAVADUR':compte==='perso'?'Personnel':'Tous comptes')+' — '+year]),
    csvRow(['Date','Fournisseur','Catégorie','Bien','BT lié','Description','Compte','HT (€)','TVA (%)','TTC (€)','Rapprochée','Lien Drive']),
    ...filtered.map(f=>{
      const wo=f.wo_id?S.workOrders.find(w=>w.id===f.wo_id):null;
      return csvRow([
        f.date?new Date(f.date).toLocaleDateString('fr-FR'):'',
        f.fournisseur||'',f.categorie||'',f.bien||'',
        wo?wo.title:'',f.description||'',
        f.compte==='savadur'?'J&A SAVADUR':'Personnel',
        fmt(f.montant_ht),f.taux_tva||0,fmt(f.montant_ttc),
        f.rapproche?'Oui':'Non',f.url_drive||''
      ]);
    }),
    csvRow([]),
    csvRow(['','','','','','','TOTAL TTC','','',filtered.reduce((s,f)=>s+parseFloat(f.montant_ttc||0),0).toFixed(2).replace('.',',')])
  ];
  downloadCsv('Factures_'+(compte==='savadur'?'SAVADUR':compte==='perso'?'Perso':'Toutes')+'_'+year+'.csv', rows);
}

      });
      const total=monthly.reduce((s,v)=>s+v,0);

    }),
    csvRow([]),
    csvRow(['TOTAL','','',

        },0);

      }),
      fmt(tenants.reduce((s,t)=>s+S.rentPayments.filter(p=>p.tenant_id===t.id&&p.annee===year&&p.paye).reduce((ss,p)=>ss+parseFloat(p.loyer||0),0),0))

function exportBilanExcel(){

  const biens=S.topology.properties.filter(p=>dubailFilter(p.name));

      csvRow([f.date?new Date(f.date).toLocaleDateString('fr-FR'):'',f.fournisseur||'',f.categorie||'',f.bien||'',fmt(f.montant_ttc),f.rapproche?'Oui':'Non'])
    ),
    csvRow(['','TOTAL FACTURES','','',fmt(depFact)]),
    csvRow([]),
    csvRow(['DÉPENSES — BONS DE TRAVAUX RÉGLÉS']),
    csvRow(['Date','BT','Bien','Coût TTC']),
    ...btSavadur.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(w=>
      csvRow([w.date?new Date(w.date).toLocaleDateString('fr-FR'):'',w.title||'',w.topo_ref?.propName||'',fmt(w.cost)])
    ),
    csvRow(['','TOTAL BT','','',fmt(depBT)]),
    csvRow([]),

    csvRow(['TOTAL REVENUS','','',fmt(revenus)]),
    csvRow(['TOTAL DÉPENSES','','',fmt(totalDep)]),
    csvRow(['RÉSULTAT NET','','',fmt(resultat)]),
  ];
  downloadCsv('Bilan_SAVADUR_'+year+'.csv', rows);
  alert('Export terminé !\n\nRevenus : '+fmt(revenus)+' €\nDépenses : '+fmt(totalDep)+' €\nRésultat net : '+fmt(resultat)+' €');

    <td></td>

  </tr>`;

  // ── Sheet 2 : Revenus locatifs SAVADUR ──
  xlsContent += '<tr><td></td></tr><tr><td></td></tr>';
  xlsContent += '<tr><td colspan="8" style="font-weight:bold;font-size:14px;background:#185FA5;color:white">REVENUS LOCATIFS J&A SAVADUR — '+(S.factYear||new Date().getFullYear())+'</td></tr>';
  xlsContent += '<tr><td></td></tr>';
  xlsContent += '<tr style="background:#333;color:white"><td><b>Locataire</b></td><td><b>Logement</b></td><td><b>Mois</b></td><td><b>Année</b></td><td><b>Loyer TTC (€)</b></td><td><b>Part CAF (€)</b></td><td><b>Part locataire (€)</b></td><td><b>Date paiement</b></td></tr>';

    payments.forEach((p,i)=>{
      const bg=i%2===0?'white':'#f5f5f3';

  xlsContent+=`<tr style="background:#FFEBEE"><td><b>Factures dépenses (SAVADUR)</b></td><td style="text-align:right;color:red">${fmt2(totalDepSav)} €</td><td></td><td></td></tr>`;
  xlsContent+=`<tr style="background:#FFEBEE"><td><b>Coûts BT réglés (Dubail)</b></td><td style="text-align:right;color:red">${fmt2(btCostsSav)} €</td><td></td><td></td></tr>`;

  xlsContent+=`<tr style="background:${bilan>=0?'#1D9E75':'#D32F2F'};color:white"><td><b>RÉSULTAT NET</b></td><td style="text-align:right;font-weight:bold;font-size:14px">${fmt2(bilan)} €</td><td></td><td></td></tr>`;

  xlsContent+='</table></body></html>';

  const blob=new Blob([xlsContent],{type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='GMAO_Export_'+(S.factYear||'Tout')+'_'+(fTab==='savadur'?'SAVADUR':fTab==='perso'?'Perso':'Toutes')+'.xls';
  a.click();
}

          <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px">Note / Observation (optionnel)</label>
          <textarea id="qr-note" placeholder="Ex: RAS, vitres nettoyées, nettoyage complet effectué..." rows="3" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box;resize:vertical"></textarea>
        </div>
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px">🔐 Code PIN *</label>
          <input id="qr-pin" type="password" inputmode="numeric" placeholder="Code PIN à 4 chiffres" maxlength="6"
            style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:18px;box-sizing:border-box;text-align:center;letter-spacing:8px">
          <div id="qr-pin-error" style="color:#E24B4A;font-size:12px;margin-top:4px;display:none">Code PIN incorrect</div>
        </div>
        <button onclick="handleQRDone('${mtId}')" style="width:100%;background:#1D9E75;color:#fff;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px">
          ✓ Confirmer — C'est fait !
        </button>
        <a href="/" style="display:block;text-align:center;color:#888;font-size:13px;text-decoration:none">Annuler — Retour à GMAO Pro</a>
      </div>
    </div>
  </div>`;
}

async function handleQRDone(mtId){
  const mt=S.maintenanceTemplates.find(x=>x.id===mtId);
  if(!mt)return alert('Gamme introuvable');
  
  // Check PIN
  const pin=document.getElementById('qr-pin')?.value.trim();
  const pinError=document.getElementById('qr-pin-error');
  // Get PIN from app_config or use default 1234
  const configPin=(await sb.from('app_config').select('value').eq('key','qr_pin').single())?.data?.value||'1234';
  if(!pin){if(pinError)pinError.style.display='';pinError.textContent='Code PIN requis';return;}
  if(pin!==configPin){
    if(pinError){pinError.style.display='';pinError.textContent='Code PIN incorrect — réessayez';}
    document.getElementById('qr-pin').value='';
    document.getElementById('qr-pin').focus();
    return;
  }
  if(pinError)pinError.style.display='none';
  
  const by=document.getElementById('qr-by')?.value.trim()||'QR Code';
  const note=document.getElementById('qr-note')?.value.trim()||'';
  const today=new Date().toISOString().split('T')[0];
  
  // Calculate next due date
  let nextDue=null;
  if(mt.type==='periodic'&&mt.period_days){
    const d=new Date();d.setDate(d.getDate()+mt.period_days);
    nextDue=d.toISOString().split('T')[0];
  }
  
  // Update in Supabase
  const upd={last_done:today};
  if(nextDue)upd.next_due=nextDue;
  const {error}=await sb.from('maintenance_templates').update(upd).eq('id',mtId);
  if(error){alert('Erreur : '+error.message);return;}
  Object.assign(mt,upd);
  
  // Add journal entry if work_orders exist for this mt
  // Send confirmation email to admin
  try{
    if(BREVO_API_KEY){
      const asset=S.assets.find(a=>a.id===mt.asset_id);
      const html=`<div style="font-family:sans-serif;max-width:500px;margin:0 auto">
        <div style="background:#1D9E75;padding:20px;border-radius:8px 8px 0 0">
          <h2 style="color:#fff;margin:0">✅ Gamme validée via QR Code</h2>
        </div>
        <div style="background:#fff;padding:20px;border:1px solid #e5e5e0;border-top:none;border-radius:0 0 8px 8px">
          <p><strong>Gamme :</strong> ${mt.name}</p>
          <p><strong>Équipement :</strong> ${asset?.name||mt.bien||'—'}</p>
          <p><strong>Réalisé par :</strong> ${by}</p>
          <p><strong>Date :</strong> ${new Date().toLocaleDateString('fr-FR')}</p>
          ${note?`<p><strong>Observation :</strong> ${note}</p>`:''}
          ${nextDue?`<p><strong>Prochaine échéance :</strong> ${new Date(nextDue).toLocaleDateString('fr-FR')}</p>`:''}
        </div>
      </div>`;
      await fetch('https://api.brevo.com/v3/smtp/email',{
        method:'POST',
        headers:{'api-key':BREVO_API_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({sender:{name:'GMAO Pro',email:'antoinejosse56@gmail.com'},
          to:[{email:'antoinejosse56@gmail.com',name:'Antoine JOSSE'}],
          subject:`✅ ${mt.name} — Validé par ${by}`,htmlContent:html})
      });
    }
  }catch(e){console.warn('Email QR confirmation failed:',e.message);}
  
  // Show success page
  const root=document.getElementById('root');
  root.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f3;font-family:Arial,sans-serif;padding:20px">
    <div style="text-align:center;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:40px;max-width:360px;width:100%">
      <div style="font-size:64px">✅</div>
      <div style="font-size:22px;font-weight:700;color:#1D9E75;margin:16px 0 8px">C'est enregistré !</div>
      <div style="color:#555;margin-bottom:8px"><strong>${mt.name}</strong></div>
      <div style="color:#888;font-size:13px;margin-bottom:24px">Validé le ${new Date().toLocaleDateString('fr-FR')} par ${by}</div>
      ${nextDue?`<div style="background:#E8F5E9;border-radius:8px;padding:10px;font-size:13px;color:#2e7d32;margin-bottom:24px">📅 Prochaine échéance : ${new Date(nextDue).toLocaleDateString('fr-FR')}</div>`:''}
      <a href="/" style="background:#1D9E75;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px">Retour à GMAO Pro</a>
    </div>
  </div>`;
}


loadAll().then(async()=>{
  // Handle QR code quick-action URL params
  const urlParams=new URLSearchParams(window.location.search);
  const qrAction=urlParams.get('action');
  const qrMtId=urlParams.get('mt');
  if(qrAction==='done'&&qrMtId){
    renderQRConfirm(qrMtId);
    return;
  }
  render();
  setTimeout(()=>checkAndSendAlerts(),3000);
});
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;min-height:100vh}
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#efefec;--border:#e5e5e0;--border2:#d0d0ca;--text:#1a1a1a;--text2:#6b6b68;--text3:#9b9b98;--green:#1D9E75;--green-bg:#E1F5EE;--green-text:#0F6E56;--amber:#BA7517;--amber-bg:#FAEEDA;--red:#E24B4A;--red-bg:#FCEBEB;--red-text:#A32D2D;--blue:#185FA5;--blue-bg:#E6F1FB;--teal-bg:#E1F5EE;--purple-bg:#EEEDFE;--purple-text:#534AB7;--radius:8px;--radius-lg:12px}
/* dark mode disabled */
html,body{color-scheme:light!important;background:#fff!important;color:#1a1a1a!important}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:14px 16px;border-bottom:0.5px solid var(--border)}
.logo{font-size:15px;font-weight:600}.logo span{color:var(--green)}
.nav-section{padding:6px 0}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:8px 14px 3px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;font-size:13px;color:var(--text2);transition:background .1s;border-radius:0}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--bg2);color:var(--text);font-weight:500}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:1px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.bgreen{background:var(--green-bg);color:var(--green-text)}.bamber{background:var(--amber-bg);color:var(--amber)}.bred{background:var(--red-bg);color:var(--red-text)}.bblue{background:var(--blue-bg);color:var(--blue)}.bteal{background:var(--teal-bg);color:var(--green-text)}.bpurple{background:var(--purple-bg);color:var(--purple-text)}.bgray{background:var(--bg3);color:var(--text2)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sidebar{transition:transform .25s ease,width .25s ease}
.sidebar.collapsed{width:0!important;min-width:0!important;overflow:hidden;border:none}
.hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;cursor:pointer;border-radius:8px;background:var(--bg2);border:0.5px solid var(--border2);flex-shrink:0}
.hamburger svg{width:18px;height:18px;stroke:var(--text);stroke-width:2;fill:none}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99;cursor:pointer}
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%);width:220px!important;min-width:220px!important;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{width:100vw}
  .topbar{padding:10px 12px;gap:8px}
}
.topbar{height:50px;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.topbar h1{font-size:15px;font-weight:500;flex:1}
.btn{padding:6px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;transition:background .1s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--green);border-color:var(--green);color:#fff}.btn-p:hover{background:var(--green-text)}
.btn-d{background:var(--red);border-color:var(--red);color:#fff}.btn-d:hover{background:var(--red-text)}
.btn-sm{padding:3px 8px;font-size:11px}
.content{flex:1;overflow-y:auto;padding:18px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{background:var(--bg2);border-radius:var(--radius);padding:11px}
.stat-v{font-size:22px;font-weight:500;margin-top:2px}
.stat-l{font-size:11px;color:var(--text2)}
.sec{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.row:last-child{border-bottom:none}
.fg{flex:1}
.fgs{font-size:13px;font-weight:500}
.fgsub{font-size:11px;color:var(--text2);margin-top:1px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 10px;font-weight:500;font-size:11px;color:var(--text2);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
td{padding:7px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}
.form-group textarea{min-height:70px;resize:vertical}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200}

function isDubailProfile(){
  const u=S.currentUser;
  if(!u||u.role==='admin')return false;
  // Check profile field OR if visible_tabs contains locatif but not tools (= dubail pattern)
  if(u.profile==='dubail')return true;
  // Fallback: if user has visible_tabs set with locatif but no tools/etiquettes
  if(u.visible_tabs&&u.visible_tabs.length>0){
    const vt=u.visible_tabs;
    if(vt.includes('locatif')&&!vt.includes('tools')&&!vt.includes('etiquettes'))return true;
  }
  return false;
}
function dubailFilter(str){
  const s=(str||'').toLowerCase();

    const [u, a, t, tl, l, wo, mt, topo, rev, cpt, rel, ten, rp, wr, rng, fam, conso, facturesRes] = await Promise.all([
      sb.from('users').select('*'),

      sb.from('releves').select('*').order('date', {ascending: false}),

      sb.from('rent_payments').select('*'),
      sb.from('water_readings').select('*'),
      sb.from('rangements').select('*').order('nom'),
      sb.from('famille').select('*').order('prenom'),
      sb.from('consommables').select('*').order('nom'),
      sb.from('factures').select('*').order('date',{ascending:false})
    ]);

    // Only block on critical tables
    for (const [name, res] of [['users',u],['assets',a],['work_orders',wo]]) {
      if (res.error) { showError(`Table "${name}" : ${res.error.message}`); return; }
    }
    // Non-blocking tables
    for (const [name, res] of [['tasks',t],['tools',tl],['loans',l],['maintenance_templates',mt],['topology',topo],['revenues',rev],['compteurs',cpt],['releves',rel],['tenants',ten],['rent_payments',rp],['water_readings',wr]]) {
      if (res.error) { console.warn(`Table "${name}" non disponible:`, res.error.message); }
    }
    // Rangements — non-bloquant si table pas encore créée
    if (rng.error) { console.warn('Table rangements manquante — créez-la dans Supabase'); }

    S.users = u.data || [];
    S.assets = a.data || [];
    S.tasks = t.data || [];
    S.tools = tl.data || [];
    S.loans = l.data || [];
    S.workOrders = wo.data || [];
    S.maintenanceTemplates = mt.error ? [] : (mt.data || []);
    S.revenues = rev.error ? [] : (rev.data || []);
    S.compteurs = cpt.error ? [] : (cpt.data || []);
    S.releves = rel.error ? [] : (rel.data || []);

    S.rentPayments = rp.error ? [] : (rp.data || []);

    S.topoId = topo.data?.[0]?.id;

      // Valid data loaded — save backup in localStorage

      try{localStorage.setItem('gmao_topo_backup', JSON.stringify({data:loadedTopo,id:S.topoId,ts:new Date().toISOString()}));}catch(e){}

    showError(e.message || 'Erreur inconnue — vérifiez votre connexion internet');
  }

// Retourne les IDs d'assets liés à Dubail
function getDubailAssetIds(){
  const ids=new Set();
  // Find dubail property in topology
  S.topology.properties.forEach(p=>{
    if(!dubailFilter(p.name))return;
    // Add asset linked to this property node
    if(p.assetId)ids.add(p.assetId);
    (p.assetIds||[]).forEach(id=>ids.add(id));
    (p.zones||[]).forEach(z=>{
      if(z.assetId)ids.add(z.assetId);
      (z.assetIds||[]).forEach(id=>ids.add(id));
      (z.subZones||[]).forEach(s=>{
        if(s.assetId)ids.add(s.assetId);
        (s.assetIds||[]).forEach(id=>ids.add(id));
      });
    });
  });
  // Also match by asset name or location
  S.assets.forEach(a=>{
    if(dubailFilter(a.name)||dubailFilter(a.location||''))ids.add(a.id);
  });
  return ids;
}

// Retourne les BT filtrés selon le profil
function getFilteredWOs(){
  const u=S.currentUser;
  if(!u||u.role==='admin')return S.workOrders;
  // If user has explicit visible_assets, filter WOs by those assets
  const va=u.visible_assets||u.assets||[];
  if(va.length>0){
    return S.workOrders.filter(w=>{
      if(!w.asset_id&&!w.topo_ref)return false; // no link = hide
      if(w.asset_id&&va.includes(w.asset_id))return true;
      if(w.topo_ref){
        // Check if topo_ref's asset is in visible_assets
        const a=S.assets.find(x=>x.id===w.topo_ref.assetId);
        if(a&&va.includes(a.id))return true;
        // Fallback: dubail name check
        if(isDubailProfile()&&dubailFilter(w.topo_ref.propName||''))return true;
      }
      return false;
    });
  }
  if(!isDubailProfile())return S.workOrders;
  // Dubail without explicit assets: filter by topo_ref or asset name
  const dubailAssetIds=getDubailAssetIds();
  return S.workOrders.filter(w=>{
    const tr=w.topo_ref;
    if(tr&&dubailFilter(tr.propName||''))return true;
    if(w.asset_id){
      if(dubailAssetIds.has(w.asset_id))return true;
      const a=S.assets.find(x=>x.id===w.asset_id);
      if(a&&(dubailFilter(a.name)||dubailFilter(a.location||'')))return true;
    }
    return false;
  });
}

// Retourne les assets filtrés selon le profil  
function getFilteredAssets(){
  const u=S.currentUser;
  if(!u||u.role==='admin')return S.assets;
  // If user has explicit visible_assets list, use it
  const va=u.visible_assets||u.assets||[];
  if(va.length>0)return S.assets.filter(a=>va.includes(a.id));
  // Dubail: filter by topology
  if(isDubailProfile()){
    const ids=getDubailAssetIds();
    return S.assets.filter(a=>ids.has(a.id)||dubailFilter(a.name)||dubailFilter(a.location||''));
  }
  return S.assets;
}

function bindLogin(){
  // Pre-fill saved credentials
  const savedEmail = localStorage.getItem('gmao_saved_email')||'';
  const savedPass  = localStorage.getItem('gmao_saved_pass')||'';
  if(savedEmail){ document.getElementById('le').value=savedEmail; }
  if(savedPass){  document.getElementById('lp').value=savedPass; }
  if(savedEmail&&savedPass){ document.getElementById('lrem').checked=true; }

  document.getElementById('lb').onclick = async () => {
    const email = document.getElementById('le').value.trim();
    const pass  = document.getElementById('lp').value;
    const remember = document.getElementById('lrem').checked;
    const user  = S.users.find(u => u.email === email && u.password === pass);
    if(user){
      if(remember){
        localStorage.setItem('gmao_saved_email', email);
        localStorage.setItem('gmao_saved_pass',  pass);
      } else {
        localStorage.removeItem('gmao_saved_email');
        localStorage.removeItem('gmao_saved_pass');
      }
      S.currentUser = user; render();
    } else {
      const el=document.getElementById('lerr');
      el.style.display='block';
      el.textContent='Identifiants incorrects';
    }
  };
  document.getElementById('lp').onkeydown = e => { if(e.key==='Enter') document.getElementById('lb').click(); };
}

function getUserVisibleTabs(){
  const u=S.currentUser;
  if(!u||u.role==='admin') return null;
  if(u.visible_tabs&&u.visible_tabs.length>0) return u.visible_tabs;
  return USER_PROFILE_TABS[u.profile||'technicien']||null;
}
function applyUserProfile(prof){
  const tabs=USER_PROFILE_TABS[prof];
  document.querySelectorAll('.utab').forEach(cb=>{
    cb.checked = !tabs||tabs.includes(cb.value);
  });
}

function getUserTabs(user){
  if(!user||user.role==='admin')return null; // null = tout visible
  // Priorité : visible_tabs personnalisés > profil prédéfini
  if(user.visible_tabs&&user.visible_tabs.length>0)return user.visible_tabs;
  const prof=USER_PROFILES[user.profile]||USER_PROFILES['technicien'];
  return prof.tabs;
}
function canSeeTab(tabId){
  const tabs=getUserTabs(S.currentUser);
  return !tabs||tabs.includes(tabId);
}
function getUserAssets(user){
  if(!user||user.role==='admin')return S.assets;
  const vis=user.visible_assets||user.assets||[];
  if(vis.length===0)return S.assets; // vide = tous
  return S.assets.filter(a=>vis.includes(a.id));
}

function applyProfile(prof){
  const profileTabs=USER_PROFILES[prof]?.tabs||[];
  document.querySelectorAll('.utab').forEach(cb=>{
    cb.checked = (prof==='admin')||profileTabs.includes(cb.value);
  });
}

function navItems(){
  const assets = accessAssets(S.currentUser);
  const overdueT = S.tasks.filter(t=>t.status==='overdue'&&(isAdmin()||assets.map(a=>a.id).includes(t.asset_id))).length;
  const loanedN = S.loans.filter(l=>!l.returned).length;
  const openWO = getFilteredWOs().filter(w=>w.status==='open').length;
  const allGroups = [
    {group:'Principal', items:[
      {id:'dashboard', label:'Tableau de bord', icon:'⊞'},
      {id:'assets', label:'Équipements', icon:'◧', badge: S.assets.filter(a=>a.status==='urgent').length||0},
      {id:'tasks', label:'Échéances', icon:'◫', badge: overdueT},
      {id:'workorders', label:'Bons de travaux', icon:'◪', badge: openWO},
    ]},
    {group:'Outils', items:[
      {id:'tools', label:'Inventaire outils', icon:'◈'},
      {id:'consommables', label:'Consommables', icon:'📦'},
      {id:'etiquettes', label:'Étiquettes & QR', icon:'◩'},
      {id:'loans', label:'Prêts en cours', icon:'◉', badge: loanedN},
    ]},
    {group:'Véhicules', items:[
      {id:'vehicles', label:'Mes véhicules', icon:'🚗'},
    ]},
    {group:'Immobilier', items:[
      {id:'topology', label:'Topologie biens', icon:'◍'},
      {id:'maintenance', label:'Gammes entretien', icon:'◌'},
    ]},
    {group:'Locatif', items:[
      {id:'locatif', label:'Gestion locative', icon:'🏘'},
      {id:'compteurs', label:'Compteurs', icon:'💧'},
    ]},
    {group:'Finances', items:[
      {id:'finances', label:'Coûts & Revenus', icon:'€'},
      {id:'factures', label:'Factures', icon:'🧾'},
    ]},
    {group:'Admin', items: isAdmin()?[
      {id:'users', label:'Utilisateurs', icon:'◎'},
    ]:[]},
    {group:'Système', items: isAdmin()?[
      {id:'settings', label:'Paramètres', icon:'⚙️'},
    ]:[]},
    {group:'Famille', items:[
      {id:'famille', label:'Suivi famille', icon:'👨‍👩‍👧‍👦'},
    ]},
  ];
  // Apply visible_tabs filter
  const visibleTabs = getUserVisibleTabs();
  if(!visibleTabs) return allGroups;
  return allGroups.map(g=>({...g, items:g.items.filter(i=>visibleTabs.includes(i.id))})).filter(g=>g.items.length>0);
}

function renderDashboard(){
  const assets = getFilteredAssets();
  const wos = getFilteredWOs();
  const tasks = S.tasks.filter(t=>isAdmin()||assets.map(a=>a.id).includes(t.asset_id));
  const overdueT = tasks.filter(t=>t.status==='overdue').length;
  const loanedN = S.loans.filter(l=>!l.returned).length;
  const openWO = wos.filter(w=>w.status==='open').length;
  const dubailAssetIdSet=isDubailProfile()?getDubailAssetIds():null;
  const upcoming = S.maintenanceTemplates.filter(mt=>{
    if(dubailAssetIdSet&&mt.asset_id&&!dubailAssetIdSet.has(mt.asset_id))return false;
    if(dubailAssetIdSet&&!mt.asset_id)return false;
    const d = mt.type==='periodic' ? mt.next_due : mt.due_date;
    const n = daysUntil(d); return n!==null && n<=60 && n>=-10;
  }).sort((a,b)=>new Date(a.type==='periodic'?a.next_due:a.due_date)-new Date(b.type==='periodic'?b.next_due:b.due_date)).slice(0,5);

  return `<div class="g4" style="margin-bottom:16px">
    <div class="stat"><div class="stat-l">Équipements</div><div class="stat-v">${assets.length}</div></div>
    <div class="stat"><div class="stat-l">Tâches en retard</div><div class="stat-v" style="color:var(--red)">${overdueT}</div></div>
    <div class="stat"><div class="stat-l">Bons ouverts</div><div class="stat-v" style="color:var(--amber)">${openWO}</div></div>
    <div class="stat"><div class="stat-l">Outils prêtés</div><div class="stat-v">${loanedN}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="card">
      <div class="sec">Prochaines gammes (60j)</div>
      ${upcoming.map(mt=>{
        const d = mt.type==='periodic' ? mt.next_due : mt.due_date;
        const days = daysUntil(d);
        const asset = S.assets.find(a=>a.id===mt.asset_id);
        return `<div class="row"><div class="fg"><div class="fgs">${mt.name}</div><div class="fgsub">${asset?.name||'—'}</div></div>
          <span class="badge ${days<0?'bred':days<=15?'bamber':'bblue'}">${days<0?`${-days}j retard`:`${days}j`}</span></div>`;
      }).join('')}
      ${upcoming.length===0?'<div style="font-size:12px;color:var(--text2)">Aucune échéance proche.</div>':''}
    </div>
    <div class="card">
      <div class="sec">Bons de travaux ouverts</div>
      ${getFilteredWOs().filter(w=>w.status==='open').slice(0,5).map(w=>{
        const asset = S.assets.find(a=>a.id===w.asset_id);
        return `<div class="row"><div class="fg"><div class="fgs">${w.title}</div><div class="fgsub">${asset?.name||'—'} · ${dateLabel(w.date)}</div></div>
          <span class="badge ${w.category==='Urgence'?'bred':'bamber'}">${w.category}</span></div>`;
      }).join('')}
      ${getFilteredWOs().filter(w=>w.status==='open').length===0?'<div style="font-size:12px;color:var(--text2)">Aucun bon ouvert.</div>':''}
    </div>
  </div>`;
}

function renderAssets(){
  const assets = getFilteredAssets();
  const as = S.assetNav||{propId:null, zoneId:null, subId:null};

  // Helper: get WOs for an asset or topo node
  function nodeWOs(assetId, propId, zoneId, subId){
    return getFilteredWOs().filter(w=>{
      if(assetId && w.asset_id===assetId) return true;
      if(!w.topo_ref) return false;
      if(subId && w.topo_ref.subId===subId) return true;
      if(!subId && zoneId && w.topo_ref.zoneId===zoneId) return true;
      if(!subId && !zoneId && propId && w.topo_ref.propId===propId) return true;
      return false;
    });
  }

  // Helper: get assets linked to a topo node
  function nodeAssets(propId, zoneId, subId){
    const ids = new Set();
    const prop = S.topology.properties.find(p=>p.id===propId);
    if(!prop) return [];
    if(subId){
      const zone = prop.zones?.find(z=>z.id===zoneId);
      const sub = zone?.subZones?.find(s=>s.id===subId);
      if(sub?.assetId) ids.add(sub.assetId);
      // Also equipment with location matching
    } else if(zoneId){
      const zone = prop.zones?.find(z=>z.id===zoneId);
      if(zone?.assetId) ids.add(zone.assetId);
      (zone?.subZones||[]).forEach(s=>{ if(s.assetId) ids.add(s.assetId); });
    } else {
      if(prop.assetId) ids.add(prop.assetId);
      (prop.zones||[]).forEach(z=>{
        if(z.assetId) ids.add(z.assetId);
        (z.subZones||[]).forEach(s=>{ if(s.assetId) ids.add(s.assetId); });
      });
    }
    return assets.filter(a=>ids.has(a.id));
  }

  function statusBadge(a){
    const s = a.status==='ok'?'bgreen':a.status==='attention'?'bamber':'bred';
    return `<span class="badge ${s}">${a.status==='ok'?'OK':a.status==='attention'?'Attention':'Urgent'}</span>`;
  }

  function woSummary(wos){
    const open = wos.filter(w=>w.status==='open').length;
    const done = wos.filter(w=>w.status==='done').length;
    if(!wos.length) return '';
    return `<div style="display:flex;gap:6px;margin-top:6px">
      ${open>0?`<span class="badge bamber">${open} bon(s) ouvert(s)</span>`:''}
      ${done>0?`<span class="badge bgreen">${done} terminé(s)</span>`:''}
    </div>`;
  }

  function assetCard(a, compact=false){
    const wos = nodeWOs(a.id);
    const days = daysUntil(a.next_maint);
    return `<div class="card" style="cursor:pointer" data-goto-asset="${a.id}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">
        <div><div style="font-weight:500;font-size:13px">${a.name}</div><div style="font-size:11px;color:var(--text2)">${a.type||a.category||''}</div></div>
        ${statusBadge(a)}
      </div>
      ${!compact?`<div style="font-size:12px;color:var(--text2);margin-bottom:6px">${a.description||'—'}</div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);border-top:0.5px solid var(--border);padding-top:6px">
        <span>${dateLabel(a.next_maint)||'Aucun entretien prévu'}</span>
        ${days!==null?`<span class="badge ${days<0?'bred':days<=30?'bamber':'bgray'}">${days<0?`${-days}j retard`:`${days}j`}</span>`:''}
      </div>
      ${woSummary(wos)}
    </div>`;
  }

  // --- LEVEL 0: No property selected → show all properties ---
  if(!as.propId){
    const nonImmo = assets.filter(a=>a.category!=='Immobilier');
    const nonImmoWOs = nonImmo.map(a=>nodeWOs(a.id)).flat();
    return `<div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px">Sélectionnez un bien ou consultez directement vos équipements.</div>
      ${S.topology.properties.length>0?`
      <div class="sec">Biens immobiliers</div>
      <div class="g2" style="margin-bottom:20px">
        ${S.topology.properties.map(p=>{
          const pAssets = nodeAssets(p.id, null, null);
          const pWOs = nodeWOs(p.assetId, p.id, null, null);
          const openWOs = pWOs.filter(w=>w.status==='open').length;
          const zones = p.zones||[];
          return `<div class="card" style="cursor:pointer" data-asset-nav-prop="${p.id}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
              <div><div style="font-weight:500;font-size:14px">🏠 ${p.name}</div><div style="font-size:11px;color:var(--text2)">${zones.length} zone(s)</div></div>
              ${openWOs>0?`<span class="badge bred">${openWOs} bon(s) ouvert(s)</span>`:'<span class="badge bgreen">OK</span>'}
            </div>
            <div style="font-size:12px;color:var(--text2)">${pAssets.length} équipement(s) lié(s)</div>
            ${woSummary(pWOs)}
          </div>`;
        }).join('')}
      </div>`:''}
      ${nonImmo.length>0?`
      <div class="sec">Équipements, véhicules & outillage</div>
      <div class="g2">${nonImmo.map(a=>assetCard(a)).join('')}</div>`:''}
    </div>`;
  }

  // --- LEVEL 1: Property selected, no zone ---
  const prop = S.topology.properties.find(p=>p.id===as.propId);
  if(!prop) { S.assetNav={propId:null,zoneId:null,subId:null}; return renderAssets(); }

  if(!as.zoneId){
    const propAsset = prop.assetId ? assets.find(a=>a.id===prop.assetId) : null;
    const propWOs = nodeWOs(prop.assetId, prop.id, null, null);
    const zones = prop.zones||[];
    return `<div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-prop="">← Tous les biens</span>
        <span style="color:var(--text3)">›</span>
        <span style="font-size:13px;font-weight:500">🏠 ${prop.name}</span>
      </div>
      ${propAsset?`<div class="card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div><div style="font-weight:500">${prop.name}</div><div style="font-size:11px;color:var(--text2)">Bien immobilier</div></div>
          ${statusBadge(propAsset)}
        </div>
        ${woSummary(propWOs)}
        <button class="btn btn-sm" style="margin-top:8px" data-goto-asset="${propAsset.id}">Voir la fiche →</button>
      </div>`:''}
      ${propWOs.length>0?`<div style="margin-bottom:14px">
        <div class="sec">Bons de travaux — ${prop.name}</div>
        ${propWOs.map(w=>`<div class="wo-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div><div style="font-weight:500;font-size:13px">${w.title}</div><div style="font-size:11px;color:var(--text2)">${dateLabel(w.date)}</div></div>
            <span class="badge ${w.status==='done'?'bgreen':'bamber'}">${w.status==='done'?'Terminé':'Ouvert'}</span>
          </div>
          ${w.description?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${w.description}</div>`:''}
        </div>`).join('')}
      </div>`:''}
      ${zones.length>0?`<div class="sec">Zones</div>
      <div class="g2">
        ${zones.map(z=>{
          const zAssets = nodeAssets(prop.id, z.id, null);
          const zWOs = nodeWOs(z.assetId, prop.id, z.id, null);
          const openWOs = zWOs.filter(w=>w.status==='open').length;
          return `<div class="card" style="cursor:pointer" data-asset-nav-zone="${z.id}" data-asset-nav-prop2="${prop.id}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">
              <div><div style="font-weight:500">📁 ${z.name}</div><div style="font-size:11px;color:var(--text2)">${(z.subZones||[]).length} sous-zone(s)</div></div>
              ${openWOs>0?`<span class="badge bred">${openWOs} ouvert(s)</span>`:''}
            </div>
            <div style="font-size:12px;color:var(--text2)">${zAssets.length} équipement(s)</div>
            ${woSummary(zWOs)}
          </div>`;
        }).join('')}
      </div>`:''}
    </div>`;
  }

  // --- LEVEL 2: Zone selected ---
  const zone = prop.zones?.find(z=>z.id===as.zoneId);
  if(!zone){ S.assetNav.zoneId=null; return renderAssets(); }

  if(!as.subId){
    const zoneAsset = zone.assetId ? assets.find(a=>a.id===zone.assetId) : null;
    const zoneWOs = nodeWOs(zone.assetId, prop.id, zone.id, null);
    const subs = zone.subZones||[];
    return `<div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-prop="">← Tous les biens</span>
        <span style="color:var(--text3)">›</span>
        <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-zone="">🏠 ${prop.name}</span>
        <span style="color:var(--text3)">›</span>
        <span style="font-size:13px;font-weight:500">📁 ${zone.name}</span>
      </div>
      ${zoneAsset?`<div class="card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div><div style="font-weight:500">${zone.name}</div><div style="font-size:11px;color:var(--text2)">Zone</div></div>
          ${statusBadge(zoneAsset)}
        </div>
        ${woSummary(zoneWOs)}
        <button class="btn btn-sm" style="margin-top:8px" data-goto-asset="${zoneAsset.id}">Voir la fiche →</button>
      </div>`:''}
      ${zoneWOs.length>0?`<div style="margin-bottom:14px">
        <div class="sec">Bons de travaux — ${zone.name}</div>
        ${zoneWOs.map(w=>`<div class="wo-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div><div style="font-weight:500;font-size:13px">${w.title}</div><div style="font-size:11px;color:var(--text2)">${dateLabel(w.date)}</div></div>
            <span class="badge ${w.status==='done'?'bgreen':'bamber'}">${w.status==='done'?'Terminé':'Ouvert'}</span>
          </div>
          ${w.description?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${w.description}</div>`:''}
        </div>`).join('')}
      </div>`:''}
      ${subs.length>0?`<div class="sec">Sous-zones</div>
      <div class="g2">
        ${subs.map(s=>{
          const sAssets = nodeAssets(prop.id, zone.id, s.id);
          const sWOs = nodeWOs(s.assetId, prop.id, zone.id, s.id);
          const openWOs = sWOs.filter(w=>w.status==='open').length;
          return `<div class="card" style="cursor:pointer" data-asset-nav-sub="${s.id}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">
              <div><div style="font-weight:500">📂 ${s.name}</div><div style="font-size:11px;color:var(--text2)">${(s.trades||[]).length} corps de métier</div></div>
              ${openWOs>0?`<span class="badge bred">${openWOs} ouvert(s)</span>`:''}
            </div>
            <div style="font-size:12px;color:var(--text2)">${sAssets.length} équipement(s)</div>
            ${woSummary(sWOs)}
          </div>`;
        }).join('')}
      </div>`:''}
      ${subs.length===0?`<div class="sec" style="margin-top:14px">Équipements directs</div>
      <div class="g2">${nodeAssets(prop.id,zone.id,null).map(a=>assetCard(a)).join('')}</div>`:''}
    </div>`;
  }

  // --- LEVEL 3: Subzone selected ---
  const sub = zone.subZones?.find(s=>s.id===as.subId);
  if(!sub){ S.assetNav.subId=null; return renderAssets(); }
  const subWOs = nodeWOs(sub.assetId, prop.id, zone.id, sub.id);
  const subAssets = nodeAssets(prop.id, zone.id, sub.id);

  return `<div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-prop="">← Tous les biens</span>
      <span style="color:var(--text3)">›</span>
      <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-zone="">🏠 ${prop.name}</span>
      <span style="color:var(--text3)">›</span>
      <span style="cursor:pointer;color:var(--blue);font-size:13px" data-asset-nav-sub="">📁 ${zone.name}</span>
      <span style="color:var(--text3)">›</span>
      <span style="font-size:13px;font-weight:500">📂 ${sub.name}</span>
    </div>
    ${subWOs.length>0?`<div style="margin-bottom:14px">
      <div class="sec">Bons de travaux — ${sub.name}</div>
      ${subWOs.map(w=>`<div class="wo-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div style="font-weight:500;font-size:13px">${w.title}</div><div style="font-size:11px;color:var(--text2)">${dateLabel(w.date)}</div></div>
          <span class="badge ${w.status==='done'?'bgreen':'bamber'}">${w.status==='done'?'Terminé':'Ouvert'}</span>
        </div>
        ${w.description?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${w.description}</div>`:''}
      </div>`).join('')}
    </div>`:''}
    ${subAssets.length>0?`<div class="sec">Équipements</div>
    <div class="g2">${subAssets.map(a=>assetCard(a)).join('')}</div>`:''}
    ${subAssets.length===0&&subWOs.length===0?'<div style="font-size:12px;color:var(--text2)">Aucun équipement ni bon de travaux pour cette sous-zone.</div>':''}
  </div>`;
}

  const hist = a.history||[];

    return `<div class="row"><span style="color:var(--text2);font-size:12px;min-width:160px">${label}</span><span style="font-size:13px;font-weight:500">${val||'—'}</span></div>`;
  }

  return `<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">

  ${S.subTab==='info'?`<div class="g2">

      ${[['Type',a.type||'—'],['Localisation',a.location||'—'],['Prochain entretien',dateLabel(a.next_maint)],['Interventions',hist.length+' entrée(s)']].map(([l,v])=>`<div class="row"><span style="color:var(--text2)">${l}</span><span>${v}</span></div>`).join('')}

        ${cgField('(C.4.1) Raison sociale', cg.raison_sociale)}
        ${cgField('(C.4.2) Adresse', cg.adresse)}
        <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px">Véhicule</div>
        ${cgField('(D.1) Marque', cg.marque)}
        ${cgField('(D.2) Type / Variante', cg.type_variante)}
        ${cgField('(D.3) Dénomination commerciale', cg.denomination)}
        ${cgField('(E) N° identification (VIN)', cg.vin)}
        ${cgField('(F.1) Masse max. technique (kg)', cg.masse_max)}
        ${cgField('(F.2) Masse en charge max. (kg)', cg.masse_charge)}

        <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px">Motorisation</div>

  ${S.subTab==='history'?`<div class="card">

      ${canEdit()?`<button class="btn btn-p btn-sm" id="btn-add-history">+ Intervention</button>`:''}

    ${hist.slice().reverse().map(h=>`<div class="row">

      <div class="fg">
        <div style="display:flex;align-items:center;gap:6px"><span class="fgs">${h.type}</span><span class="badge bgray">${dateLabel(h.date)}</span>${h.cost>0?`<span class="badge bblue">${h.cost}€</span>`:''}</div>
        <div class="fgsub">${h.desc}</div>
        <div style="font-size:11px;color:var(--text3)">Par : ${h.by}</div>

    ${hist.length===0?'<div style="font-size:12px;color:var(--text2)">Aucune intervention.</div>':''}

  ${S.subTab==='wo'?`<div class="card">

          <span class="fgs" style="font-size:14px;font-weight:600">${w.title}</span>

    </div>`).join('')}
    ${woList.length===0?'<div style="font-size:12px;color:var(--text2)">Aucun bon.</div>':''}

  ${S.subTab==='docs'?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="sec" style="margin:0">Documents</div>
      ${canEdit()?`<button class="btn btn-p btn-sm" id="btn-add-doc">+ Document</button>`:''}
    </div>
    ${docs.map(d=>`<div class="row">
      <span style="font-size:16px">${d.type==='devis'?'📋':d.type==='facture'?'🧾':'📄'}</span>
      <div class="fg">
        <div class="fgs">${d.name}</div>
        <div class="fgsub">${d.type} · ${dateLabel(d.date)}</div>
      </div>
      <a href="${d.url}" target="_blank" rel="noopener" class="btn btn-sm btn-p" style="flex-shrink:0">📂 Ouvrir</a>
      ${isAdmin()?`<button class="btn btn-d btn-sm" data-del-doc="${d.id}">✕</button>`:''}
    </div>`).join('')}
    ${docs.length===0?'<div style="font-size:12px;color:var(--text2)">Aucun document.</div>':''}
  </div>`:''}`;
}

function renderTasks(){
  const assets = accessAssets(S.currentUser);
  const tasks = S.tasks.filter(t=>isAdmin()||assets.map(a=>a.id).includes(t.asset_id));
  const sorted = tasks.slice().sort((a,b)=>{const o={overdue:0,pending:1,done:2};return(o[a.status]||1)-(o[b.status]||1)||new Date(a.due_date)-new Date(b.due_date);});
  return `<div class="card"><div style="overflow-x:auto"><table>
    <thead><tr><th>Tâche</th><th>Équipement</th><th>Échéance</th><th>Priorité</th><th>Statut</th><th>Assigné</th><th></th></tr></thead>
    <tbody>
    ${sorted.map(t=>{
      const asset = S.assets.find(a=>a.id===t.asset_id);
      const user = S.users.find(u=>u.id===t.assigned_to);
      return `<tr>
        <td><div style="font-weight:500">${t.title}</div><div style="font-size:11px;color:var(--text2)">${t.description||''}</div></td>
        <td><span style="cursor:pointer;color:var(--blue)" data-goto-asset="${asset?.id}">${asset?.name||'—'}</span></td>
        <td style="font-size:12px">${dateLabel(t.due_date)}</td>
        <td><span class="badge ${t.priority==='high'?'bred':t.priority==='medium'?'bamber':'bblue'}">${t.priority==='high'?'Haute':t.priority==='medium'?'Moyenne':'Basse'}</span></td>
        <td><span class="badge ${t.status==='overdue'?'bred':t.status==='done'?'bgreen':'bamber'}">${t.status==='overdue'?'Retard':t.status==='done'?'Fait':'À faire'}</span></td>
        <td>${user?`<div style="display:flex;align-items:center;gap:5px"><div class="avatar">${user.initials}</div><span style="font-size:12px">${user.name}</span></div>`:'—'}</td>
        <td style="white-space:nowrap">
          ${canEdit()&&t.status!=='done'?`<button class="btn btn-sm" data-done-task="${t.id}">✓</button> `:''}
          ${isAdmin()?`<button class="btn btn-d btn-sm" data-del-task="${t.id}">✕</button>`:''}
        </td>
      </tr>`;
    }).join('')}
    ${sorted.length===0?'<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text2)">Aucune tâche.</td></tr>':''}
    </tbody>
  </table></div></div>`;
}

function renderTopology(){
  const ts = S.topoState;
  const prop = S.topology.properties?.find(p=>p.id===ts.propId);
  const zone = prop?.zones?.find(z=>z.id===ts.zoneId);
  const subZone = zone?.subZones?.find(s=>s.id===ts.subZoneId);
  const trade = subZone?.trades?.find(t=>t.id===ts.tradeId)
             || zone?.trades?.find(t=>t.id===ts.tradeId);

  // Breadcrumb
  function breadcrumb(){
    const parts = [];
    if(prop) parts.push(`<span style="cursor:pointer;color:var(--blue)" data-topo-prop="${prop.id}">${prop.name}</span>`);
    if(zone) parts.push(`<span style="cursor:pointer;color:var(--blue)" data-topo-zone="${zone.id}">${zone.name}</span>`);
    if(subZone) parts.push(`<span style="cursor:pointer;color:var(--blue)" data-topo-subzone="${subZone.id}">${subZone.name}</span>`);
    if(trade) parts.push(`<span>${trade.icon||''} ${trade.name}</span>`);
    return parts.length ? `<div style="font-size:12px;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">${parts.join('<span style="color:var(--text3)">›</span>')}</div>` : '';
  }

  function treeNodeZone(z, propId){
    const exp = ts.expanded[z.id];
    const hasSub = z.subZones&&z.subZones.length>0;
    const hasTrades = z.trades&&z.trades.length>0;
    const hasChildren = hasSub||hasTrades;
    const isSel = ts.zoneId===z.id&&!ts.subZoneId;
    return `<div>
      <div class="tree-row ${isSel?'selected':''}" data-topo-zone="${z.id}">
        ${hasChildren?`<span class="tree-toggle" data-topo-toggle="${z.id}">${exp?'▾':'▸'}</span>`:'<span class="tree-toggle"></span>'}
        <span>📁</span><span style="flex:1">${z.name}</span>
        ${isAdmin()?`<span style="font-size:11px;color:var(--text3);cursor:pointer;padding:0 3px" data-add-sub="${z.id}" title="Ajouter sous-zone">+</span>`:''}
        ${isAdmin()?`<span style="font-size:11px;color:#E24B4A;cursor:pointer;padding:0 3px" data-del-zone="${z.id}" data-del-zone-prop="${propId}">✕</span>`:''}
      </div>
      ${hasChildren&&exp?`<div class="tree-children">
        ${(z.subZones||[]).map(s=>treeNodeSub(s,z.id,propId)).join('')}
        ${(z.trades||[]).map(t=>treeNodeTrade(t,z.id,null,propId)).join('')}
      </div>`:''}
    </div>`;
  }

  function treeNodeSub(s, zoneId, propId){
    const exp = ts.expanded[s.id];
    const hasTrades = s.trades&&s.trades.length>0;
    const isSel = ts.subZoneId===s.id;
    return `<div>
      <div class="tree-row ${isSel?'selected':''}" data-topo-subzone="${s.id}" data-topo-subzone-zone="${zoneId}">
        ${hasTrades?`<span class="tree-toggle" data-topo-toggle="${s.id}">${exp?'▾':'▸'}</span>`:'<span class="tree-toggle"></span>'}
        <span>📂</span><span style="flex:1">${s.name}</span>
        ${isAdmin()?`<span style="font-size:11px;color:var(--text3);cursor:pointer;padding:0 3px" data-add-trade="${s.id}" data-add-trade-zone="${zoneId}" title="Ajouter corps de métier">+</span>`:''}
        ${isAdmin()?`<span style="font-size:11px;color:#E24B4A;cursor:pointer;padding:0 3px" data-del-sub="${s.id}" data-del-sub-zone="${zoneId}" data-del-sub-prop="${propId}">✕</span>`:''}
      </div>
      ${hasTrades&&exp?`<div class="tree-children">${s.trades.map(t=>treeNodeTrade(t,zoneId,s.id,propId)).join('')}</div>`:''}
    </div>`;
  }

  function treeNodeTrade(t, zoneId, subId, propId){
    const isSel = ts.tradeId===t.id;
    return `<div class="tree-row ${isSel?'selected':''}" data-topo-trade="${t.id}" data-topo-trade-zone="${zoneId}" data-topo-trade-sub="${subId||''}">
      <span class="tree-toggle"></span>
      <span>${t.icon||'🔧'}</span><span style="flex:1">${t.name}</span>
      ${isAdmin()?`<span style="font-size:11px;color:#E24B4A;cursor:pointer;padding:0 3px" data-del-trade="${t.id}" data-del-trade-zone="${zoneId}" data-del-trade-sub="${subId||''}" data-del-trade-prop="${propId}">✕</span>`:''}
    </div>`;
  }

  // Determine what to show in right panel

  function topoAssetPanel(nodeAssetId, nodeName){
    if(!nodeAssetId && !nodeName) return '';
    const asset = nodeAssetId ? S.assets.find(a=>a.id===nodeAssetId) : null;
    const ts = S.topoState;
    // Find WOs linked to this topo node (by assetId OR by topo_ref matching current node)
    const wos = S.workOrders.filter(w=>{
      if(nodeAssetId && w.asset_id===nodeAssetId) return true;
      if(!w.topo_ref) return false;
      if(ts.subZoneId && w.topo_ref.subId===ts.subZoneId) return true;
      if(!ts.subZoneId && ts.zoneId && w.topo_ref.zoneId===ts.zoneId && !w.topo_ref.subId) return true;
      if(!ts.subZoneId && !ts.zoneId && ts.propId && w.topo_ref.propId===ts.propId && !w.topo_ref.zoneId) return true;
      return false;
    });
    const hist = asset?.history||[];
    const openWos = wos.filter(w=>w.status==='open');
    return `<div style="margin-top:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="card" style="padding:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div class="sec" style="margin:0">Bons de travaux (${wos.length})</div>
            ${canEdit()?`<button class="btn btn-sm btn-p" data-topo-add-wo="${nodeAssetId}">+ Bon</button>`:''}
          </div>
          ${openWos.map(w=>`<div class="row">
            <div class="fg"><div class="fgs" style="font-size:12px">${w.title}</div><div class="fgsub">${dateLabel(w.date)} · ${w.category||''}</div></div>
            <span class="badge ${w.status==='done'?'bgreen':'bamber'}" style="font-size:10px">${w.status==='done'?'Terminé':'Ouvert'}</span>
          </div>`).join('')}
          ${wos.filter(w=>w.status==='done').length>0&&openWos.length===0?`<div style="font-size:11px;color:var(--text2)">${wos.length} bon(s) terminé(s)</div>`:''}
          ${wos.length===0?'<div style="font-size:11px;color:var(--text2)">Aucun bon de travaux.</div>':''}
        </div>
        <div class="card" style="padding:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div class="sec" style="margin:0">Historique (${hist.length})</div>
            ${canEdit()?`<button class="btn btn-sm btn-p" data-topo-add-hist="${nodeAssetId}">+ Intervention</button>`:''}
          </div>
          ${hist.slice().reverse().slice(0,3).map(h=>`<div class="row">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:3px"></div>
            <div class="fg"><div class="fgs" style="font-size:12px">${h.type} — ${dateLabel(h.date)}</div><div class="fgsub">${h.desc}</div></div>
          </div>`).join('')}
          ${hist.length===0?'<div style="font-size:11px;color:var(--text2)">Aucune intervention.</div>':''}
        </div>
      </div>
    </div>`;
  }

  let rightPanel = '';
  if(!prop){
    rightPanel = '<div style="padding:20px;color:var(--text2)">Sélectionnez un bien.</div>';
  } else if(trade){
    // Show trade elements
    const items = trade.items||[];
    rightPanel = `<div class="card">
      ${breadcrumb()}
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:14px;font-weight:500">${trade.icon||'🔧'} ${trade.name}</div>
        ${isAdmin()?`<button class="btn btn-sm btn-p" id="btn-add-topo-item">+ Élément</button>`:''}
      </div>
      ${items.map(item=>`<div class="row">
        <div class="fg"><div class="fgs">${item.name}</div>${item.notes?`<div class="fgsub">${item.notes}</div>`:''}</div>
        ${isAdmin()?`<button class="btn btn-d btn-sm" data-del-topo-item="${item.id}">✕</button>`:''}
      </div>`).join('')}
      ${items.length===0?'<div style="font-size:12px;color:var(--text2)">Aucun élément. Cliquez "+ Élément" pour commencer.</div>':''}
    </div>`;
  } else if(subZone){
    // Show trades of subzone
    const trades = subZone.trades||[];
    rightPanel = `<div class="card">
      ${breadcrumb()}
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:14px;font-weight:500">📂 ${subZone.name}</div>
        ${isAdmin()?`<button class="btn btn-sm btn-p" id="btn-add-trade-here" data-for-sub="${subZone.id}" data-for-zone="${zone.id}">+ Corps de métier</button>`:''}
      </div>
      <div class="g3">${trades.map(t=>`<div class="card" style="cursor:pointer;text-align:center;padding:14px" data-topo-trade="${t.id}" data-topo-trade-zone="${zone.id}" data-topo-trade-sub="${subZone.id}">
        <div style="font-size:22px;margin-bottom:4px">${t.icon||'🔧'}</div>
        <div style="font-size:13px;font-weight:500">${t.name}</div>
        <div style="font-size:11px;color:var(--text2)">${t.items?.length||0} élément(s)</div>
      </div>`).join('')}</div>
      ${trades.length===0?'<div style="font-size:12px;color:var(--text2)">Aucun corps de métier.</div>':''}
    </div>
    ${!subZone.assetId&&canEdit()?`<div style="margin-top:10px"><button class="btn btn-p" style="width:100%" data-link-node="${subZone.id}" data-link-name="${subZone.name}" data-link-type="Sous-zone">🔗 Lier un équipement à cette sous-zone</button></div>`:''}
    ${topoAssetPanel(subZone.assetId, subZone.name)}`;
  } else if(zone){
    // Show subzones + direct trades
    const subs = zone.subZones||[];
    const trades = zone.trades||[];
    rightPanel = `<div class="card">
      ${breadcrumb()}
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:14px;font-weight:500">📁 ${zone.name}</div>
        <div style="display:flex;gap:6px">
          ${isAdmin()?`<button class="btn btn-sm" id="btn-add-sub-here" data-for-zone="${zone.id}">+ Sous-zone</button>`:''}
          ${isAdmin()?`<button class="btn btn-sm btn-p" id="btn-add-trade-direct" data-for-zone="${zone.id}">+ Corps de métier</button>`:''}
        </div>
      </div>
      ${subs.length>0?`<div class="sec">Sous-zones</div>
        <div class="g3">${subs.map(s=>`<div class="card" style="cursor:pointer;text-align:center;padding:14px" data-topo-subzone="${s.id}" data-topo-subzone-zone="${zone.id}">
          <div style="font-size:22px;margin-bottom:4px">📂</div>
          <div style="font-size:13px;font-weight:500">${s.name}</div>
          <div style="font-size:11px;color:var(--text2)">${(s.trades||[]).length} corps de métier</div>
        </div>`).join('')}</div>`:''}
      ${trades.length>0?`<div class="sec" style="margin-top:${subs.length>0?'12px':'0'}">Corps de métier directs</div>
        <div class="g3">${trades.map(t=>`<div class="card" style="cursor:pointer;text-align:center;padding:14px" data-topo-trade="${t.id}" data-topo-trade-zone="${zone.id}" data-topo-trade-sub="">
          <div style="font-size:22px;margin-bottom:4px">${t.icon||'🔧'}</div>
          <div style="font-size:13px;font-weight:500">${t.name}</div>
          <div style="font-size:11px;color:var(--text2)">${t.items?.length||0} élément(s)</div>
        </div>`).join('')}</div>`:''}
      ${subs.length===0&&trades.length===0?'<div style="font-size:12px;color:var(--text2)">Zone vide. Ajoutez une sous-zone ou un corps de métier directement.</div>':''}
    </div>
    ${!zone.assetId&&canEdit()?`<div style="margin-top:10px"><button class="btn btn-p" style="width:100%" data-link-node="${zone.id}" data-link-name="${zone.name}" data-link-type="Zone">🔗 Lier un équipement à cette zone</button></div>`:''}
    ${topoAssetPanel(zone.assetId, zone.name)}`;
  } else {
    // Show zones of property
    const zones = prop.zones||[];
    rightPanel = `<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:14px;font-weight:500">🏠 ${prop.name}</div>
        ${isAdmin()?`<button class="btn btn-sm btn-p" id="btn-add-zone-here">+ Zone</button>`:''}
      </div>
      <div class="g3">${zones.map(z=>`<div class="card" style="cursor:pointer;text-align:center;padding:14px" data-topo-zone="${z.id}">
        <div style="font-size:22px;margin-bottom:4px">📁</div>
        <div style="font-size:13px;font-weight:500">${z.name}</div>
        <div style="font-size:11px;color:var(--text2)">${(z.subZones||[]).length} sous-zone(s) · ${(z.trades||[]).length} corps de métier</div>
      </div>`).join('')}</div>
      ${zones.length===0?'<div style="font-size:12px;color:var(--text2)">Aucune zone. Commencez par ajouter une zone (ex: Appartement 1er gauche, RDC, Cave...).</div>':''}
    </div>
    ${!prop.assetId&&canEdit()?`<div style="margin-top:10px"><button class="btn btn-p" style="width:100%" data-link-node="${prop.id}" data-link-name="${prop.name}" data-link-type="Bien immobilier">🔗 Lier un équipement à ce bien</button></div>`:''}
    ${topoAssetPanel(prop.assetId, prop.name)}`;
  }

  return `<div class="split">
    <div class="split-left">
      <div class="card" style="padding:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="sec" style="margin:0">Biens</div>
          ${isAdmin()?`<button class="btn btn-sm btn-p" id="btn-add-prop">+</button>`:''}
        </div>
        ${(S.topology.properties||[]).map(p=>`<div class="tree-row ${ts.propId===p.id?'selected':''}" data-topo-prop="${p.id}">
          <span>🏠</span><span style="flex:1;font-size:13px">${p.name}</span>
          ${isAdmin()?`<span style="font-size:11px;cursor:pointer;color:var(--text3);padding:0 3px" data-add-zone-prop="${p.id}" title="Ajouter zone">+</span>`:''}
          ${isAdmin()?`<span style="font-size:11px;color:#E24B4A;cursor:pointer;padding:0 3px" data-del-prop="${p.id}">✕</span>`:''}
        </div>`).join('')}
      </div>
      ${prop?`<div class="card" style="padding:10px;margin-top:10px">
        <div class="sec" style="margin-bottom:8px">${prop.name}</div>
        ${(prop.zones||[]).map(z=>treeNodeZone(z, prop.id)).join('')}
        ${(prop.zones||[]).length===0?'<div style="font-size:11px;color:var(--text3)">Aucune zone.</div>':''}
      </div>`:''}
    </div>
    <div class="split-right">${rightPanel}</div>
  </div>`;
}

function renderVehicles(){
  const vehicles = S.assets.filter(a=>a.category==='Véhicule');
  return `<div class="g2">
    ${vehicles.map(v=>{
      const sb = v.status==='ok'?'bgreen':v.status==='attention'?'bamber':'bred';
      const days = daysUntil(v.next_maint);
      const wos = S.workOrders.filter(w=>w.asset_id===v.id);
      const mts = S.maintenanceTemplates.filter(m=>m.asset_id===v.id);
      return `<div class="card" style="cursor:pointer" data-goto-asset="${v.id}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
          <div>
            <div style="font-size:16px;margin-bottom:4px">🚗</div>
            <div style="font-weight:500;font-size:14px">${v.name}</div>
            <div style="font-size:11px;color:var(--text2)">${v.location||''}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
            <span class="badge ${sb}">${v.status==='ok'?'OK':v.status==='attention'?'Attention':'Urgent'}</span>
            ${v.carte_grise?.immat?`<span style="font-family:monospace;font-size:12px;font-weight:700;background:#1a3a6b;color:#fff;padding:2px 8px;border-radius:4px;letter-spacing:.08em">${v.carte_grise.immat}</span>`:''}
          </div>
        </div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:10px">${v.description||'—'}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;margin-bottom:10px">
          <div style="background:var(--bg2);padding:6px 8px;border-radius:var(--radius)">
            <div style="color:var(--text3)">Prochain entretien</div>
            <div style="font-weight:500;margin-top:2px">${dateLabel(v.next_maint)}</div>
          </div>
          <div style="background:var(--bg2);padding:6px 8px;border-radius:var(--radius)">
            <div style="color:var(--text3)">Gammes / Bons</div>
            <div style="font-weight:500;margin-top:2px">${mts.length} / ${wos.length}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;border-top:0.5px solid var(--border);padding-top:8px;font-size:11px">
          <span style="color:var(--text3)">${v.history?.length||0} intervention(s)</span>
          ${days!==null?`<span class="badge ${days<0?'bred':days<=30?'bamber':'bgray'}">${days<0?`${-days}j retard`:`${days}j`}</span>`:''}
        </div>
      </div>`;
    }).join('')}
    ${vehicles.length===0?`<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text2)">
      <div style="font-size:32px;margin-bottom:10px">🚗</div>
      <div>Aucun véhicule. Ajoutez un équipement de catégorie <b>Véhicule</b>.</div>
    </div>`:''}
  </div>`;
}

function renderLocatif(){
  const tab = S.locatifTab||'tenants';
  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const year = S.locatifYear||2026;
  const tenants = getFilteredTenants().filter(t=>t.actif!==false);
  const fmt = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(n||0);

  const tabBar = `<div class="tab-bar" style="margin-bottom:14px">
    <div class="tab ${tab==='tenants'?'active':''}" data-loc-tab="tenants">Locataires</div>
    <div class="tab ${tab==='loyers'?'active':''}" data-loc-tab="loyers">Saisie loyers</div>
    <div class="tab ${tab==='synthese'?'active':''}" data-loc-tab="synthese">Synthèse</div>
    <div class="tab ${tab==='dettes'?'active':''}" data-loc-tab="dettes">Dettes</div>
  </div>`;

  const yearBar = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <span style="font-size:12px;color:var(--text2)">Année :</span>
    ${[2024,2025,2026,2027].map(y=>`<span class="pill ${year===y?'active':''}" data-loc-year="${y}">${y}</span>`).join('')}
  </div>`;

  // ====== LOCATAIRES ======
  if(tab==='tenants'){
    return `${tabBar}
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      ${isAdmin()?`<button class="btn btn-p" id="btn-add-tenant">+ Locataire</button>`:''}
    </div>
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Logement</th><th>Locataire</th><th>Email</th><th>Type</th><th>Loyer réf.</th><th>Charges</th><th>Entrée</th><th>Statut</th><th></th></tr></thead>
      <tbody>
      ${tenants.length===0?`<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--text2)">
        Aucun locataire. Cliquez "+ Locataire" pour commencer.
      </td></tr>`:''}
      ${tenants.map(t=>`<tr>
        <td style="font-weight:500">${t.logement||'—'}</td>
        <td>${t.nom}</td>
        <td style="font-size:12px;color:var(--text2)">${t.email||'—'}</td>
        <td><span class="badge ${t.type_bail==='commercial'?'bblue':'bgreen'}">${t.type_bail==='commercial'?'Commercial':'Habitation'}</span></td>
        <td style="font-weight:500">${fmt(t.loyer_ref)}</td>
        <td style="font-size:12px">${t.charges?fmt(t.charges):'—'}</td>
        <td style="font-size:12px">${t.date_entree?new Date(t.date_entree).toLocaleDateString('fr-FR'):'—'}</td>
        <td><span class="badge ${t.actif!==false?'bgreen':'bgray'}">${t.actif!==false?'Actif':'Parti'}</span></td>
        <td style="white-space:nowrap">
          ${canEdit()?`<button class="btn btn-sm" data-edit-tenant="${t.id}">✎</button> `:''}
          ${isAdmin()?`<button class="btn btn-d btn-sm" data-del-tenant="${t.id}">✕</button>`:''}
        </td>
      </tr>`).join('')}
      </tbody>
    </table></div></div>`;
  }

  // ====== SAISIE LOYERS ======
  if(tab==='loyers'){
    const allowedTenantIds=new Set(tenants.map(t=>t.id));
    const filteredPayments=S.rentPayments.filter(p=>allowedTenantIds.has(p.tenant_id));
    const selTenant = S.selTenantLoyer||null;
    const selMonth = S.selMonthLoyer||MONTHS[new Date().getMonth()];
    return `${tabBar}${yearBar}
    <div style="display:grid;grid-template-columns:240px 1fr;gap:14px;align-items:start">
      <!-- Liste locataires -->
      <div class="card" style="padding:10px">
        <div class="sec" style="margin-bottom:8px">Locataires</div>
        ${tenants.map(t=>{
          const paid = filteredPayments.filter(p=>p.tenant_id===t.id&&p.annee===year&&p.paye).reduce((s,p)=>s+(p.loyer||0),0);
          const due = (t.loyer_ref||0)*12;
          return `<div class="tree-row ${selTenant===t.id?'selected':''}" data-sel-tenant="${t.id}" style="padding:7px 8px">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500">${t.nom}</div>
              <div style="font-size:11px;color:var(--text2)">${t.logement||''}</div>
              <div style="display:flex;gap:6px;margin-top:3px">
                ${t.bail_url?`<a href="${t.bail_url}" target="_blank" style="font-size:10px;color:var(--blue);text-decoration:none">📄 Bail</a>`:''}
                ${t.edl_url?`<a href="${t.edl_url}" target="_blank" style="font-size:10px;color:var(--green);text-decoration:none">🏠 EDL</a>`:''}
                ${t.assurance_url?`<a href="${t.assurance_url}" target="_blank" style="font-size:10px;color:var(--amber);text-decoration:none">🛡 Assurance</a>`:''}
                ${t.assurance_url?`<a href="${t.assurance_url}" target="_blank" style="font-size:10px;color:var(--amber);text-decoration:none">🛡 Assurance</a>`:''}
              </div>
            </div>
            <span class="badge ${paid>=due*0.9?'bgreen':paid>0?'bamber':'bred'}" style="font-size:10px">${fmt(paid)}</span>
          </div>`;
        }).join('')}
        ${tenants.length===0?'<div style="font-size:12px;color:var(--text2);padding:8px">Aucun locataire actif.</div>':''}
      </div>
      <!-- Grille mois -->
      ${selTenant?(()=>{
        const t = tenants.find(x=>x.id===selTenant);
        if(!t) return '<div class="card">Locataire introuvable.</div>';
        return `<div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <div>
              <div style="font-size:15px;font-weight:500">${t.nom}</div>
              <div style="font-size:12px;color:var(--text2)">${t.logement||''} · Loyer réf. : ${fmt(t.loyer_ref)}</div>
            </div>
            <span class="badge ${t.type_bail==='commercial'?'bblue':'bgreen'}">${t.type_bail==='commercial'?'Commercial HT+TVA':'Habitation'}</span>
          </div>
          ${t.type_bail==='commercial'?`
          <div style="background:var(--amber-bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 12px;margin-bottom:12px;font-size:12px">
            💡 Local commercial — loyer saisi en <b>HT</b>. La TVA 20% est calculée automatiquement.
            Loyer HT : <b>${fmt(t.loyer_ref)}</b> → TVA : <b>${fmt(t.loyer_ref*0.2)}</b> → TTC : <b>${fmt(t.loyer_ref*1.2)}</b>
            ${t.charges>0?` | Charges HT : <b>${fmt(t.charges)}</b> → TTC : <b>${fmt(t.charges*1.2)}</b>`:''}
          </div>`:'' }
          <div style="overflow-x:auto"><table>
            <thead><tr>
              <th>Mois</th>
              ${t.type_bail==='commercial'?`
                <th>Loyer HT</th><th>TVA 20%</th><th>Loyer TTC</th>
                ${t.charges>0?'<th>Charges HT</th><th>Charges TTC</th>':''}
                <th>Total TTC attendu</th>
              `:`<th>Loyer attendu</th>${t.charges>0?'<th>Charges</th>':''}<th>Total attendu</th>`}
              <th>Reçu</th><th>Date</th><th>CAF</th><th>Statut</th><th></th>
            </tr></thead>
            <tbody>
            ${MONTHS.map((mois,mi)=>{
              const p = filteredPayments.find(x=>x.tenant_id===t.id&&x.annee===year&&x.mois===mois);
              const isPaid = p?.paye;
              const montant = p?.loyer||0;
              const isComm = t.type_bail==='commercial';
              const loyerHT = t.loyer_ref||0;
              const loyerTVA = isComm ? loyerHT*0.2 : 0;
              const loyerTTC = isComm ? loyerHT*1.2 : loyerHT;
              const chargesHT = t.charges||0;
              const chargesTTC = isComm ? chargesHT*1.2 : chargesHT;
              const totalAttendu = loyerTTC + (isComm ? chargesTTC : chargesHT);
              return `<tr style="${isPaid?'':'background:var(--bg2)'}">
                <td style="font-weight:500">${mois}</td>
                ${isComm?`
                  <td style="font-size:12px">${fmt(loyerHT)}</td>
                  <td style="font-size:12px;color:var(--amber)">${fmt(loyerTVA)}</td>
                  <td style="font-weight:500">${fmt(loyerTTC)}</td>
                  ${chargesHT>0?`<td style="font-size:12px">${fmt(chargesHT)}</td><td style="font-size:12px">${fmt(chargesTTC)}</td>`:''}
                  <td style="font-weight:500">${fmt(totalAttendu)}</td>
                `:`
                  <td>${fmt(loyerHT)}</td>
                  ${chargesHT>0?`<td style="font-size:12px">${fmt(chargesHT)}</td>`:''}
                  <td style="font-weight:500">${fmt(loyerHT+chargesHT)}</td>
                `}
                <td style="font-weight:500;color:${isPaid?'var(--green)':'var(--text)'}">${montant>0?fmt(montant):'—'}</td>
                <td style="font-size:11px">
                  ${p?.date_loc?'🏦 '+new Date(p.date_loc).toLocaleDateString('fr-FR'):'—'}
                  ${p?.date_caf?'<br>🏢 CAF : '+new Date(p.date_caf).toLocaleDateString('fr-FR'):''}
                </td>
                <td style="font-size:12px">${p?.caf>0?fmt(p.caf):'—'}</td>
                <td>${isPaid?'<span class="badge bgreen">✓ Payé</span>':montant>0?'<span class="badge bamber">Partiel</span>':'<span class="badge bgray">En attente</span>'}</td>
                <td style="white-space:nowrap">
                  ${canEdit()&&!isPaid?`<button class="btn btn-sm btn-p" data-pay-loyer="${t.id}" data-pay-mois="${mois}" data-pay-year="${year}">✓ Valider</button> `:''}
                  ${canEdit()?`<button class="btn btn-sm" data-saisie-loyer="${t.id}" data-saisie-mois="${mois}" data-saisie-year="${year}">✎ Saisir</button>`:''}
                  ${p&&canEdit()?`<button class="btn btn-sm btn-d" data-del-rp="${p.id}" title="Supprimer ce paiement">✕</button>`:''}
                </td>
              </tr>`;
            }).join('')}
            </tbody>
          </table></div>
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-top:0.5px solid var(--border);margin-top:8px;font-weight:500">
            <span>Total reçu ${year}</span>
            <span style="color:var(--green)">${fmt(filteredPayments.filter(p=>p.tenant_id===t.id&&p.annee===year&&p.paye).reduce((s,p)=>s+(p.loyer||0),0))}</span>
          </div>
        </div>`;
      })():`<div class="card" style="display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--text2)">
        Sélectionnez un locataire dans la liste.
      </div>`}
    </div>`;
  }

  // ====== SYNTHESE ======
  if(tab==='synthese'){
    const allowedTenantIds=new Set(tenants.map(t=>t.id));
    const filteredPayments=S.rentPayments.filter(p=>allowedTenantIds.has(p.tenant_id));
    // Split Dubail vs perso
    const dubailTenants=tenants.filter(t=>dubailFilter(t.logement||''));
    const persoTenants=tenants.filter(t=>!dubailFilter(t.logement||''));
    const dubailIds=new Set(dubailTenants.map(t=>t.id));
    const persoIds=new Set(persoTenants.map(t=>t.id));
    const dubailPmts=filteredPayments.filter(p=>dubailIds.has(p.tenant_id));
    const persoPmts=filteredPayments.filter(p=>persoIds.has(p.tenant_id));

    function statsBlock(label,tList,pmtList,color){
      const percu=pmtList.filter(p=>p.paye&&p.annee===year).reduce((s,p)=>s+(p.loyer||0),0);
      const attendu=tList.reduce((s,t)=>s+(t.loyer_ref||0)*12,0);
      const dettes=pmtList.filter(p=>!p.paye&&p.loyer>0&&p.annee===year).reduce((s,p)=>s+(p.loyer||0),0);
      return `<div class="card" style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:600;color:${color};margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid ${color}">${label} — ${tList.length} locataire(s)</div>
        <div class="g4">
          <div class="stat"><div class="stat-l">Loyers perçus ${year}</div><div class="stat-v" style="color:var(--green)">${fmt(percu)}</div></div>
          <div class="stat"><div class="stat-l">Loyers attendus</div><div class="stat-v">${fmt(attendu)}</div></div>
          <div class="stat"><div class="stat-l">En retard</div><div class="stat-v" style="color:var(--red)">${fmt(dettes)}</div></div>
          <div class="stat"><div class="stat-l">Taux encaissement</div><div class="stat-v" style="color:${attendu>0?'var(--blue)':'var(--text2)'}">${attendu>0?Math.round(percu/attendu*100)+'%':'—'}</div></div>
        </div>
        ${tList.length>0?`<div style="overflow-x:auto;margin-top:10px"><table>
          <thead><tr><th>Locataire</th><th>Logement</th><th>Loyer réf.</th>${MONTHS.filter((_,i)=>i<new Date().getMonth()+2).map(m=>`<th style="font-size:10px">${m.slice(0,3)}</th>`).join('')}<th>Total</th></tr></thead>
          <tbody>${tList.map(t=>{
            const tPmts=pmtList.filter(p=>p.tenant_id===t.id&&p.annee===year);
            const total=tPmts.filter(p=>p.paye).reduce((s,p)=>s+(p.loyer||0),0);
            return '<tr><td style="font-weight:500;font-size:12px">'+t.nom+'</td><td style="font-size:11px;color:var(--text2)">'+t.logement+'</td><td style="font-size:12px">'+fmt(t.loyer_ref||0)+'</td>'+MONTHS.filter((_,i)=>i<new Date().getMonth()+2).map(m=>{const p=tPmts.find(x=>x.mois===m);return '<td style="font-size:11px;text-align:center">'+(p?p.paye?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--amber)">…</span>':'<span style="color:var(--text3)">—</span>')+'</td>';}).join('')+'<td style="font-weight:600;font-size:12px">'+fmt(total)+'</td></tr>';
          }).join('')}</tbody>
        </table></div>`:''}
      </div>`;
    }

    return `${tabBar}${yearBar}
    ${!isDubailProfile()?statsBlock('🏢 J&A SAVADUR — 26 rue Général Dubail',dubailTenants,dubailPmts,'#185FA5'):''}
    ${!isDubailProfile()&&persoTenants.length>0?statsBlock('🏠 Biens personnels',persoTenants,persoPmts,'#1D9E75'):''}
    ${isDubailProfile()?statsBlock('🏢 J&A SAVADUR — 26 rue Général Dubail',tenants,filteredPayments,'#185FA5'):''}
    `;
  }

  if(tab==='dettes'){
    const debts = tenants.map(t=>{
      const unpaid = S.rentPayments.filter(p=>p.tenant_id===t.id&&!p.paye&&p.loyer>0);
      return {t, unpaid, total: unpaid.reduce((s,p)=>s+(p.loyer||0),0)};
    }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
    return `${tabBar}
    <div class="card">
      <div class="sec">Impayés & dettes</div>
      ${debts.length===0?'<div style="font-size:13px;color:var(--text2);padding:20px;text-align:center">Aucune dette enregistrée.</div>':''}
      ${debts.map(({t,unpaid,total})=>`
        <div class="row" style="align-items:flex-start;padding:12px 0">
          <div class="fg">
            <div class="fgs">${t.nom} <span style="font-size:11px;color:var(--text2)">${t.logement||''}</span></div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
              ${unpaid.map(p=>`<span class="badge bred" style="font-size:10px">${p.mois} ${p.annee} : ${fmt(p.loyer)}</span>`).join('')}
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:16px;font-weight:500;color:var(--red)">${fmt(total)}</div>
            <div style="font-size:11px;color:var(--text2)">${unpaid.length} mois impayé(s)</div>
          </div>
        </div>`).join('')}
    </div>`;
  }

  return '';
}

function renderFactures(){
  const fmt = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(n||0);
  const factures = S.factures||[];
  const fTab = S.facturesTab||'liste';
  const year = S.facturesYear||new Date().getFullYear();
  const compte = S.facturesCompte||'all';

  // Filters
  const years = [...new Set(factures.map(f=>f.date?.slice(0,4)).filter(Boolean))].sort().reverse();
  if(!years.includes(String(year))) years.unshift(String(year));

  const filtered = factures.filter(f=>{
    if(year && f.date && !f.date.startsWith(String(year))) return false;
    if(compte==='savadur' && f.compte!=='savadur') return false;
    if(compte==='perso' && f.compte!=='perso') return false;
    return true;
  });

  const totalTTC = filtered.reduce((s,f)=>s+parseFloat(f.montant_ttc||0),0);
  const nonRaprochees = filtered.filter(f=>!f.rapproche).length;

  const tabBar=`<div class="tab-bar">
    <div class="tab ${fTab==='liste'?'active':''}" data-ftab-factures="liste">📋 Toutes les factures</div>

    <div class="tab ${fTab==='export'?'active':''}" data-ftab-factures="export">📥 Exports Excel</div>
  </div>`;

  const yearBar=`<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">

      <option value="all" ${compte==='all'?'selected':''}>Tous les comptes</option>
      <option value="savadur" ${compte==='savadur'?'selected':''}>J&A SAVADUR (savadur56)</option>

  </div>`;

  const statsBar=`<div class="g4" style="margin-bottom:12px">
    <div class="stat"><div class="stat-l">Factures ${year}</div><div class="stat-v">${filtered.length}</div></div>
    <div class="stat"><div class="stat-l">Total TTC</div><div class="stat-v" style="color:var(--red)">${fmt(totalTTC)}</div></div>
    <div class="stat"><div class="stat-l">Non rapprochées</div><div class="stat-v" style="color:${nonRaprochees>0?'var(--amber)':'var(--green)'}">${nonRaprochees}</div></div>
    <div class="stat"><div class="stat-l">Rapprochées</div><div class="stat-v" style="color:var(--green)">${filtered.length-nonRaprochees}</div></div>
  </div>`;

  // LISTE TAB
  if(fTab==='liste'){
    const CATS=['Travaux/Artisan','Matériaux','Énergie','Téléphone/Internet','Assurance','Abonnement','Autre'];
    const catFilter = S.facturesCat||'all';
    const catBar=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <span class="pill ${catFilter==='all'?'active':''}" data-fcat-factures="all">Toutes</span>
      ${CATS.map(c=>`<span class="pill ${catFilter===c?'active':''}" data-fcat-factures="${c}">${c}</span>`).join('')}
    </div>`;
    const display = catFilter==='all'?filtered:filtered.filter(f=>f.categorie===catFilter);
    return `${tabBar}${yearBar}${statsBar}${catBar}
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr>
        <th>Date</th><th>Fournisseur</th><th>Catégorie</th><th>Bien / BT</th>
        <th>Compte</th><th>HT</th><th>TVA</th><th>TTC</th><th>Rapproché</th><th></th>
      </tr></thead>
      <tbody>
      ${display.length===0?`<tr><td colspan="10" style="text-align:center;padding:20px;color:var(--text2)">Aucune facture. Cliquez "+ Facture" pour commencer.</td></tr>`:''}
      ${display.map(f=>{
        const wo=f.wo_id?S.workOrders.find(w=>w.id===f.wo_id):null;
        const bien=f.bien||wo?.topo_ref?.propName||'—';
        return `<tr style="${!f.rapproche?'background:var(--red-bg)opacity:0.3':''}">
          <td style="font-size:12px;white-space:nowrap">${f.date?new Date(f.date).toLocaleDateString('fr-FR'):'—'}</td>
          <td style="font-weight:500;font-size:13px">${f.fournisseur||'—'}</td>
          <td><span class="badge bblue" style="font-size:10px">${f.categorie||'—'}</span></td>
          <td style="font-size:11px;color:var(--text2)">${bien}${wo?`<br><span style="color:var(--blue)">BT: ${wo.title}</span>`:''}</td>
          <td style="font-size:11px">${f.compte==='savadur'?'🏢 SAVADUR':'🏠 Perso'}</td>
          <td style="font-size:12px">${f.montant_ht>0?fmt(f.montant_ht):'—'}</td>
          <td style="font-size:12px;color:var(--amber)">${f.taux_tva>0?fmt(f.montant_ttc-f.montant_ht)+'<br><span style=\'font-size:10px\'>'+f.taux_tva+'%</span>':'—'}</td>
          <td style="font-weight:600;color:var(--red)">${fmt(f.montant_ttc)}</td>
          <td style="text-align:center">
            <input type="checkbox" data-rapproche-facture="${f.id}" ${f.rapproche?'checked':''} style="width:16px;height:16px;cursor:pointer">

      Total TTC : <span style="color:var(--red);margin-left:8px">${fmt(display.reduce((s,f)=>s+parseFloat(f.montant_ttc||0),0))}</span>
    </div></div>`;
  }

  // RAPPROCHEMENT TAB
  if(fTab==='rapprochement'){
    const sorted=[...filtered].sort((a,b)=>new Date(a.date)-new Date(b.date));

    <div class="card">
      <div class="sec" style="margin-bottom:8px">Cochez chaque facture lorsqu'elle correspond à un débit sur votre compte bancaire</div>
      ${sorted.map(f=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);${f.rapproche?'opacity:0.6':''}">
        <input type="checkbox" data-rapproche-facture="${f.id}" ${f.rapproche?'checked':''} style="width:20px;height:20px;flex-shrink:0;cursor:pointer;accent-color:var(--green)">
        <div style="flex:1">

          <div style="font-size:11px;color:var(--text2)">${f.date?new Date(f.date).toLocaleDateString('fr-FR'):'—'} · ${f.bien||'—'} · ${f.description||''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:700;color:var(--red);font-size:15px">${fmt(f.montant_ttc)}</div>
          <div style="font-size:10px;color:var(--text2)">${f.compte==='savadur'?'SAVADUR':'Perso'}</div>

      </div>`).join('')}
      ${filtered.length===0?'<div style="text-align:center;padding:20px;color:var(--text2)">Aucune facture pour cette période.</div>':''}
    </div>`;
  }

  // EXPORT TAB
  if(fTab==='export'){
    return `${tabBar}${yearBar}
    <div class="card">
      <div class="sec" style="margin-bottom:12px">📥 Exports Excel</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div style="background:var(--bg2);padding:14px;border-radius:var(--radius)">
          <div style="font-size:13px;font-weight:600;margin-bottom:4px">📊 Factures dépenses</div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:10px">Toutes les factures de l'année, triées par date, avec statut de rapprochement</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-p btn-sm" id="btn-export-factures-all">📥 Toutes (${year})</button>
            <button class="btn btn-sm" id="btn-export-factures-savadur" style="background:var(--blue-bg);color:var(--blue)">📥 SAVADUR uniquement</button>
            <button class="btn btn-sm" id="btn-export-factures-perso">📥 Personnel uniquement</button>
          </div>
        </div>
        <div style="background:var(--bg2);padding:14px;border-radius:var(--radius)">
          <div style="font-size:13px;font-weight:600;margin-bottom:4px">💰 Revenus locatifs SAVADUR</div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:10px">Loyers perçus par locataire, mois par mois, avec total annuel</div>

          <div style="font-size:13px;font-weight:600;margin-bottom:4px">📈 Bilan complet SAVADUR</div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:10px">Revenus locatifs − Factures SAVADUR − BT réglés SAVADUR = Résultat net</div>

        </div>
      </div>
    </div>`;
  }
  return '';
